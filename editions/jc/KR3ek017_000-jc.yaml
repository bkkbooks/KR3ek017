body:
  text: 凡例癰與疽之治截然兩途世人以癰疽連呼並治夫癰疽二字之連呼即夫妻二字之連呼也若以癰藥治疽猶以安胎之藥服其夫矣是集以癰疽分別兩途皆識症執方之法如照法法制照症用藥救人之功余不敢分害人之罪余當獨認情願萬劫披毛甘受屠家誅戮輯是集專論陰虛陽實認定紅白兩色是癰是疽治即痊愈所載諸方皆藥到病愈切勿增減並勿因貴重之藥減輕逐症治法開卷一目瞭然不必投師人人可精此道諸書惟馮氏錦囊內附陰疽論與余家遺秘相符獨無消疽之方惟以溫補兼托為法且疽初起即如平塌安可用托托則成患余家之法以消為貴以托為畏即流注瘰癧惡核倘有潰者仍不敢托托則潰者雖斂增出者又如何耶故以消為貴也外科之虛實發現在外治之法集中詳細不必諳脈儘可救人故痘症之險悶順逆眼科之心肝脾肺腎皆現於外故亦不診脈也好學者察患色則知症照症治無不痊醫可寄生死閱坊刻外科妄稱正宗載云症現七惡即死又載以桐油燒紅衣針針入痰塊半寸用降藥為條插入針孔七日塊自開裂再以條插七日其核自落又稱毒在皮里肉內刀割深要寸許傷透內腑病人何能堪此極刑七惡之現頃矣世之宗其法治盡屬劊徒此集惟疔用刺其外概不輕用刀針並禁用升降痛爛二藥遍身所患止有紅白兩色紅者癰白者疽癰疽即其名也有謂無名腫毒者因未識其陰陽也是書無論背項腰腹白色者言疽以疽藥愈之紅腫者言癰以癰藥愈之坊刻書稱以某藥與服不應再易某藥豈非以人試藥乎倘患生要緊穴道安可遭醫幾試望高明詳之世無爛久之癰惟疽初起失消或遭降灸針割以致年久不斂治之方藥集中詳細此集有行到之處好學者自然以此治法初起者消久潰者斂余恐此集遲到醫未經目人未見習以致多誤是以任坊翻刻速遍海內使醫有生人之治而無枉死之人余願遂矣載癰疽咽喉疔毒結毒諸瘡痔漏等症皆藥到病愈之方其雜症及臨症後所附諸病諸方亦一服即效者附梓集中內無以人試藥之誤望有力者照方合就對病旋送或止取藥本或抄方傳人註明法制是書所有之藥法制極詳不可忽略宜細心照法精製藥純效速傷寒症有轉經傳變故有醫不執方之說至如外科雜症全賴識症執方餘年七十有二治病經歷四十餘年用藥從無一錯故敢輯是集以公諸世因名症治全生重訂凡例是集流行已久縉紳之家幾於家置一編每遇外症照方抄服幸而獲效群以為神即或致誤不尤方之刺謬而咎之無治庚生侍先生臨症數年每見發背乳岩等症誤服陽和湯犀黃丸而敗者不可勝算心甚憫焉特覓善本請先生評正刊刻庶讀是書者知所採焉不能紅白二色分陰陽也是集大旨以分陰陽為主而其分之之法則不辨脈息不分虛實惟以色之紅白為定不知陰中有陽陽中有陰有真熱有假熱有真寒有假寒若一概以色之紅白為分何能無誤外科不能不明脈理無論癰疽瘡瘍症雖現於外病必由於內即幾微之疔毒癬疥亦必內有火毒濕熱而後外發其未發之先脈必先見洪數弦滑等象更有外症雖輕而本原大虧者有內病與外症交發者若非細辨脈理何以別虛實寒熱標本先後乎乃曰不諳脈理儘可救人真如夢囈外科不能不讀靈樞素問肺癰肺疽肺痿細辨脈象自知金匱云問曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰是肺癰之候察脈便知有何難覺而曰諸患易識肺癰難覺耶惟其不諳脈理不讀靈素以致如是是集流傳已久輾轉淆訛貽誤非淺爰覓道光中裘氏本重加訂正其分兩一切悉仍其舊惟加評語以便採擇是集所選方藥半系瘍科必不可少之方其未加評語諸方均平妥可用惟藥性炮製諸法太覺簡略當照本草備要雷公炮製為是林屋散人言外科不諳脈理可以救人吳庚生駁之甚是蓋外科雖較內科稍易如不知脈僅辨外面形色以紅白為寒熱何以分其真假寒熱虛實陰陽耶然脈學欲知其精細毫無錯謬者不但外科中少有其人即求諸內科中亦不常有如不識脈理人可用予所作簡便醫學寒暑表測其寒熱亦可竟分明也階臣記

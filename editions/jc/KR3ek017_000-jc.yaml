front:
  text: 潘序余閱外科書多矣而求其剖析陰陽辨理寒熱簡明切要者莫如此書靈樞癰疽之篇條緒繁多淺學難於尋識金匱只列瘡癰腸癰兩種大意以深淺分陰陽而其旨未暢後人鑽研未由遂歧途徑王氏獨招絕學啟發靈扁振墜扶危厥功鉅已嘉定王氏校刊本鄂中再刻之其論證互見未便繙閱家弟器之治此有年曾為區分門類頗有增損字句世稱善本嗣長洲蔣氏刻於蘇城伯寅弟翻雕於京師鄂中尚無此本余既刊各種醫書成即急為付梓以廣流傳吳縣潘霨黃序是編乃林屋散人出其家傳枕中秘不為自私自利之謀而亟亟焉以濟人為急務嘔出心肝盡情昭揭以陰陽辨癰疽之別以赤白明陰陽之著實能補古方書所未逮其詞簡其法易雖不明醫者亦開卷瞭然於心目也往歲余患骨槽風醫家投散風清火之品幾至危殆得是書如法治之乃瘥余頗信之厥後凡親友間遇有病瘰癧痰核流注背癰及一切陰發重症各告以照方施治無不立效余益信之乃者胡氏外孫女左股痛足不著地年餘矣既覺所苦處漫腫堅硬而皮色如故是編所謂貼骨疽無疑也亦照方投以煎劑丸散不百日而潰且斂矣余惟信之深而尤欲人共信之獨惜坊本率多亥豕之誤方謀訂正重刊廣為流布外孫女欣然解囊金授余而請之適王君荊門曾有勘定本極精審遂付剞劂凡人有所樂為皆根諸心而其心之一於公者世不概見林屋散人是編之著可謂公之至矣今復以王君善校本行世俾觀是編者人人知醫豈不一大快事乎哉外孫女年未及笄聰慧知書余嘉其信道之篤好善之誠因識刊刻顛末略書數語於簡端道光辛丑六月子仁氏黃鋐序林屋散人憫人之混稱癰疽不知癰之與疽治法大相懸殊此辨析癰是癰疽是疽於古方書未備而獨得行之秘授者一一出方濟世不使後人以訛傳訛千古竟同長夜非謂是書一出諸方書可盡廢也凡與世醫治法無有異同者不載古方書具在可遍觀面博取焉惟讀者好學深思心知其意爾子仁氏九月朔又識王序余自幼聞癰疽有不可治之症名曰陰發五六歲時舅氏子京先生以骨槽風亡問之長老云久則成癆瘵也甲午歲子仁丈患骨槽風始甚劇後按外科症治全生法治輒愈余取其書觀之乃知陽為癰陰為疽骨槽風亦陰疽類非由瘵發由發後服涼藥延久成瘵耳世人知陰發之名而不達陰發之治良可概也適秦君立甫元其家藏別本余因據以參校互有得失其字之顯訛者改正之間有改而義仍未明及疑者有疑而未改者如大癰潰後治法兩本並云體虛年老者投參耆草皆炙也夫托毒忌炙上已詳之而此忽云炙蓋承上痛息毒散腫退色轉紅活而言即體虛年老者亦必至是而後可用炙斷斷不可早用今改云體虛年老者始投參耆草更用炙勿仍誤謂虛者初起即當用灸也瘰癧治法第四條云即在手下之腳骨別本云即在手下突出之骨腳骨足跗外高骨也突出之骨掌後之銳骨也患系喉間手為近故從別本然足陽明脈亦循喉嚨下循䯒外廉下足跗拔疔散六和散兩方並有瓜蠍而他方或作瓜蠍或作血蠍考古方書有作瓜兒血蠍者知此蠍為蠍誤第如雄黃之名腰黃後集申之瓜竭則無文本補亦無瓜竭之名今並改血竭輕粉無毒而於黃連則云解輕粉毒文歧出考本草亦云無毒而注云有毒黃連解今改無為有庶免眩惑牛膝治莖痛莖別本或改作脛按莖中痛水道中痛也第曰莖似非莖中矣而本草主治列莖中痛此其脫中字乎癰疽方訣歸芩花粉節煎或麻黃青蒿甘草皆有用節者此其甘草節乎鎖喉方藥訣甘草各一錢別本作二錢本草當歸全者活血而是書云定血此俱未敢臆斷表弟時清甫於吳門買是書即立甫所藏本清甫又於書肆舊書中見是書與吳門所買本異欲買之以示余則即子仁先生藏本也重刻者不外此二本輾轉淆訛益不足據矣原本刻於乾隆五年子仁先生藏本則重刻於嘉慶五年立甫藏本不知其刻於何年是書流傳已百餘年而瘍醫都若未見何哉胡氏孤女所患久治不效案是書法治乃效既效欲刻余所校本以廣其傳爰更取二本嚴勘付梓而序其始末並識其疑以質世之精於醫者道光二十有一年辛丑七月朔日王浩荊門氏撰馬評湯序周禮天官瘍醫掌腫瘍潰瘍折瘍之祝藥劀殺之劑注云劀謂刮去膿血殺謂以藥食其惡肉又曰凡療瘍以五毒攻之注云今醫方有五毒之藥合黃堥置石膽丹砂雄黃礬石磁石其中燒之三日三夜其煙上著以雞羽掃取之以注瘡惡肉破骨則盡出又曰以五氣養之以五藥療之以五味節之注云既劀東而攻盡其宿肉乃養之也五氣當作五穀之誤是上古瘍藥攻補兼施無專用攻擊之確證予嘗慨醫藏一目綜今存者幾與釋道埒惟瘍醫之書其見著錄惟宋李迅集驗背疽方竇漢卿瘡瘍經驗全書元齊德之外科精義為近古而國朝王氏洪緒撰全生集說尤完美蓋是書務審病因而辨章陰陽強弱不失累黍故世推為善本武進馬培之先生關龠道樞營壘寶蠌三世學醫趾美彌篤由是譽滿江南一時叩門求藥者踵武相接候色譣眉莫不膏肓洞達已而被詔入都聲望益奮廓其聞見所療輒應如春臺登而上池飲也其明年既告歸家荈林阿貞頤暇日宏覽秘芨思有述造用詔末學以王氏重用陽劑發言過激非古人和緩之意奮以己意攘剔瑕瑜別白湯劑條件斠正列於眉間凡一月書成以歸武林吳氏付剞劂行世夫陰疽流注呼吸死生俗醫剽竊一二禁方妄施針石固足殺人即高明之士競競守王氏一家言亢厲自高而於受病之本因發病之形色及夫陰陽向背用藥節宣禁忌之所宜概置不講其為伐天和而殘民命亦挺刃之異耳今得先生斯評庶業醫者得所圭臬不致索塗擿埴其為功甚巨而先生所以自壽以壽人者亦詎可量哉刻既成用述緣起如此光緒九年季春之月蕭山湯紀尚拜敘馬評吳序光緒丙子秋兒子庚生病胃脹痛百治不瘳耳孟河馬培之先生醫聲挈兒子就河莊求治日坐先生旁見其就診者日數百輩其以瘍毒來證者去尋丈外即聽聲譣色洞達癥結訝其先囑之奇間詰之因謂予瘡瘍之發患實內蘊病情神色未有不達於面目者故可望形而得之其用藥非精熟靈素按脈辨證平章陰陽無以應手輒效如兢兢守一二古方漫然施治不莽莽乎且外症實難於內科非得真傳口訣未易券獲至於看法治法手法亦非筆墨所能宣刀針有當用有不當用有不能用之別如謂一概禁之非正治也如癰疽毒初聚用針以泄氣可冀消散毒已成針之易收口若令自潰必至膿腐穿破瘡口卷臠難以收功古書固不可廢而辨證尤為首務議論所及又謂王氏全生集一書近時業瘍科者奉為枕秘設遇症即錄方照服既不憑脈亦不辨症貽誤非淺集中所載陽和湯犀黃丸子龍丸法非不善而論證究失一偏白陷者概認作疽用陽和湯不知假寒真熱假熱真寒區別攸分陽和湯為溫散血中寒邪果系陰寒凝結服之或可消散如伏熱鬱熱之症皮色白者誤投之是速其潰也至已潰之症麻黃尤所必忌乳岩起於肝鬱郁久化火掣痛薑桂必不宜服肺癰乃金受火克肺喜清肅倘肺有伏熱犀黃丸多潰氣之品詎非轉劫真陰乎子龍丸行水驅痰之劑只可施之壯實如虛羸之質則吐瀉作而生氣損矣先生之論類如是皆發前人所未發而其要首貴審脈而已爰亟覓舊本首請詳註重刻行世以不負先生壽世之苦心工既竣因質述其平日之說以告世之讀是書者先生尚有驗方新編亦按部擇驗過之方增減重訂成集待刊云光緒九年仲春上浣仁和吳恆仲英自序明劉誠意伯言藥不對症枉死者多余曾祖若谷公秘集云癰疽無一死症而諸書所載患生何處病屬何經故治乳岩而用羚羊犀角治橫痃而用生地防己治瘰癧惡核而用夏桔連翹概不論陰虛陽實惟多用引經之藥以致乳岩橫痃患成不救瘰癧惡核潰久轉怯竟不知為引經之藥所誤反諉咎於白疽本不可救不亦謬歟夫紅癰乃陽實之症氣血熱而毒滯白疽乃陰虛之症氣血寒而毒凝二者俱以開腠理為要腠理開紅癰解毒即消白疽解寒立愈若憑經而不辨症藥雖對經其實背症也世之患陰疽而致斃者頗多苟其陰陽別治何至有死症乎余曾祖留心此道以臨危救活之方初起立消之藥一一筆之於書為傳家珍寶余幼讀之與世間諸書迥別歷症四十餘年臨危者救之初起者消之痛癢者止之潰爛者斂之百治百驗憑經治症天下皆然分別陰陽惟予一家是以將祖遺秘術及予臨症將藥到病愈之方並精製藥石之法盡登是集以待世之留心救人者依方修合依法法制依症用藥庶免枉死使天下後世知癰疽果無死症云爾時乾隆五年歲在庚申仲春朔日洞庭西山王維德洪緒氏書

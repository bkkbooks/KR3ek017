body:
  text: 卷二諺云千學不如一見是以從師習道必經師率而視症以冀見廣識多使遇症無疑余故以四十餘年之臨證摘其一二奇險危篤者或用測度推原之治悉錄於下以備學者目之可免師率視症云爾臨證治法閶門龔姓腰患一疽根盤圍闊二尺余前連腹後接骨不紅不腫不痛不軟按之如木初延余治以肉桂炮姜書於方首別後另延蘇城內外三四名家眾視余方皆曰酷暑安可用此熱劑以余為非議用攻托清涼連治五日病者神昏無胃復延余治患仍不痛色如隔宿豬肝言語不清飲食不進余曰能過今晚再商是夜即斃然其至死不痛不久伊戚亦患此症延余治以陽和湯服下次日覺鬆又服疽消小半才以犀黃丸與陽和湯逐日早晚輪服第五日痊愈後有發背相若者照治而愈一壯年新婚百日妻往母家滿月方回日值酷暑未必欲畢貪涼多扇五鼓時喉痛氣逆寒熱交作余問之則曰三日前喉間略有微痛今早五鼓脹腫痛甚視其小舌腫如胖人拇指知繫心腎虛實之火並欲後經風風火兩閉之恙若用發表虛上加虛若投寒劑風火被罨即用前胡蘇子連翹元參赤芍浙貝甘桔八味煎服立愈一鄰友余家飲酒二鼓而別次早伊僕云陽物腫脹痛難小便遣來索藥度其酒歸行房妻以前用未洗之絹抹之此絹必經毒蟲咬過即用仙人對坐草以解蛇毒割人藤以解蜈蚣毒二草搗爛取汁調雄黃末塗上立刻止痛消腫下午痊愈無錫村婦年三旬五月望日下午腹飢正取麵食將舉箸忽喉疼難食彼地一醫以射干赤芍翹芩花粉牛蒡等煎服服即痰升滿口響若鼾聲痰不出齒口有痰護余問始知驟起況服涼藥增險此陰寒無疑也但痰塞一口萬難進藥即取鵝羽蘸桐油釐許入喉一卷痰隨羽出吐有升許以肉桂炮薑生甘草各五分入碗內以滾水沖浸以碗仍頓湯中用匙取藥與咽一口病者即稱好了連呷三四口人起說飢問余要飯吃可否余曰與粥最宜南濠一匠半夜請治喉症問之不能回答旁人云昨吃夜飯好好唱歌作樂睡著忽喉痛而醒余以炙附如細粞一粒放其舌上咽津數口痊愈一婦小腿經燙被醫者用冰片研入雪水敷之不一刻腿腫如斗痛極難忍請余治婦曰只求止痛死亦甘心余曰幸在小腿下身硬地倘燙腰腹用此一罨火毒入腹難以挽回以地榆研細調油拂上半刻痛止令伊自拂一二次痊愈一使女炭火燙足背爛一孔以伏龍散乳調敷不三日而愈又鄰家一孩爐上滾湯澆腹因痛自手扒破腹皮油拂上一次痛息以地榆末干撒於破處次日肌生未破者痊愈宜興馮悠也右足背連小腿轉彎處初起不過燙毒而成爛腿三十餘年四起硬肛小腿足腫如斗爛腿可容大拳有時出血有時常流臭漿滿室難聞自以布包如磚一塊以填孔內否則空痛時年七十有四雍正六年延余治以老蟾破腹蟾身刺數孔以肚雜代包填入孔內蟾身覆蓋孔外每日煎蔥椒湯俟溫早晚各洗一次以蟾易貼內服醒消丸亦早晚二服三日後取地丁大力鮮草搗爛填孔外蓋烏金膏仍以醒消丸日服其肛口外四起硬塊內有皮中滲出清水者以嫩膏加五美散敷內有發癢者以白花膏貼內有塊硬如石者以生商陸搗爛塗因孔內常有血出先以參三七末撒內次用地丁牛蒡葉根搗填如此二十餘日腿始退腫癢息而其硬塊及硬肛皆平皮色退黑內肉鮮紅患口收小平淺可以不用草填日以五寶散撒上仍貼烏金膏因老翁精神不衰飲食不減始終不補收功宜興徐玉梧子周歲半太陽一毒背上心臍對處二毒頸後口對處一毒腰腹二毒兩腿五毒共患十一毒皆皮色不異其大腿二毒已經伊處醫者開刀聞余至請治以小金丹令日服二次第五日消其九毒消後又以小金丹服一次因孩小令其添一乳母十日後二孔皆紅潤以保元湯耆草皆生加肉桂三分煎杯許另水煎參六分和服半月後以耆草易炙服愈一月收功常熟趙太元長君患橫痃被醫家開刀延余治余問開刀幾月矣彼云已有半月也余曰此患破則難治還有九月之壽即辭別別後三百日伊戚在蘇來云已死月餘興邑路姓七歲童頂門只寸許並患三疽潰久不斂孔如棋大淺而無膿干而色灰人倦無神因服涼劑過多飲食不進延余治余曰色似香灰乃氣血兩喪無膿乾枯精神已絕兼值不食難以延久何能治之次日而夭楓鎮閔姓年十上頸患瘰癧爛成爿片延爛耳腋及腰如手掌大者數處瘦弱成怯初以洞天救苦丹與服毒水大流十日後以陽和湯醒消丸每日早晚各服一次十日項能舒轉飲食日增外貼陽和膏內服大棗丸嗣後仍以前膏貼之始終用荊芥湯洗以山蓮散敷九十日收功因未服子龍小金二丸其毒根未除後腋生惡核仍以子龍丸消之杜患山塘姚姓媛年二十九小產月餘左肩手搭處先發一毒周有尺五患後半月背脊添出一毒自上至下計長一尺三寸上闊下尖皆白陷十日後始請余治其勢甚篤連服陽和湯三劑人能坐起五劑自能大小便十二劑其續發者全消先發之搭手餘地皆消只剩患頂有膿者如棋子大膿足不痛而穿四日收功後言背上如負一板舒轉不快以小金丹十丸每日二丸服畢肌膚不板神色復元程姓母年七十膝下患一陰毒流注潰經數月患下及旁又起硬腫二塊與舊患相連延一醫以新發之毒誤為舊患旁腫不識流注竟以托毒之劑與服服二劑致新發者被托發痛始延余治余以陽和湯與服三劑新發之二毒皆消接服小金丹十丸後進滋陰溫補以杏仁散敷半月膿厚令服保元湯加肉桂十餘劑愈王姓媳頸內瘰癧數個兩腋惡核三個又大腿患一毒不作疼癢百餘日後日漸發大形幾如斗按之如石皮現青筋常用抽痛經治數人皆稱曰瘤余曰瘤系軟者世無石硬之瘤乃石疽也問可治否答曰初起時皆可消日久發大上現筋紋雖按之如石其根下已成膿矣如偶作一抽之痛乃是有膿之證上現青筋者其內已作黃漿可治如上現小塊高低如石岩者不治三百日後主發大痛不潰而死如現紅筋者其內已痛血枯不治倘生斑點即自潰之證潰即放血三日內斃今患所現青筋醫至患軟為半功潰後膿變濃厚可冀收功也外以活商陸搗塗內服陽和湯十日則止一抽之痛十三劑裡外作癢十六劑頂軟十八劑通患全軟其頸項之癧塊兩腋之惡核盡行消散一無形跡只剩石疽未平內膿袋下令服參一錢因在筋絡之處先以銀針刺穿後以刀闊其口以紙釘塞入孔內次入兩次流水斗許大劑滋補托裡刪去人參倍增生耆連進十劑相安已極適有伊戚亦行外科道者令其耆草換炙服不三日四外發腫內作疼痛復延余治余令以照前方服又服二十餘劑外以陽和膏隨其根盤貼滿獨留患孔加以布捆綁人問何以既用膏貼又加布綁答曰凡屬陰疽外皮活內膜生故開刀傷膜膜爛則死所出之膿在皮裡膜外僅似空弄又不能以生肌藥放入故內服溫補滋陰活血之劑外貼活血溫暖膏藥加之以捆使其皮膜相連易於膿盡且又易於連接生肌綁後數日內膿濃厚加參服兩月收功宜興一舟子陰囊形大如斗被走方者穿之不數日爛見腎子如雞蛋大旁有一筋六七寸長形若雞腸雙環隨腎子落出臭氣難聞令以紫蘇煎湯洗淨其筋上爛腐問其腎子小便小肚痛否彼曰皆不痛余曰此三處作痛難治今不痛者可治日以紫蘇湯洗洗後以蘇梗為末撒上用青荷葉包之內服黃連歸尾黃芩甘草木通等藥十劑五日後腎子收上爛孔收小此非患毒乃是損傷口既收小肌色紅白內服地黃湯外敷生肌散而愈福建客滿身廣豆又患橫痃余想橫痃乃陰虛之症藥宜溫補廣豆系火毒之症藥宜涼解二症相背既利於毒必害於疽務使二症皆宜之藥非犀黃丸外無他法令其每日空心時酒送三錢十服二症痊愈後一人毒重者倍服而愈婦項痰核三處年久生管延治以拔管藥插入日易半月愈兩惟有一管淺如一粞不意伊夫遠歸兩日管深如舊余曰此刻治定無功效容日商治伊母問余余曰俟令婿出外半月亦可收功數日後接女歸延治而愈又壯年臂有二管問伊可有暗疾曰有夢遺余以六味刪去澤瀉增線膠龍骨芡實蓮鬚為丸鹿含草煎湯晨夕各送三錢服完二管皆痊一婦兩乳皆患乳岩兩載如桂圓大從未延醫因子死悲哭發威形大如杯以五通犀黃丸每日早晚輪服九日全消又男子乳亦患因鄰送鯽魚膏貼上兩日發大如拳色紅始來令其揭下與服陽和四劑倘色轉白可救色若仍紅無救矣四日患色仍紅哀懇求治以犀黃丸陽和湯輪服服至十六日四餘皆消獨患頂潰用蟾拔毒三日半月收功洞庭秦卜年項腋惡核十二處服連翹昆布等藥病重又被刺破爛經三載始來就醫以陽和湯犀黃丸輪服半月十中愈八喜甚帶藥而回路見涼粉買食至家又食冷水激面次日二便皆閉第五日死此病者自不惜命故記以為病者之戒南濠客葉姓耳下並患惡核一被針穿生管一大如杯以陽和小金輪服未潰者全消彼問管可易愈否余曰消管甚易管消即斂倘將斂一經走泄管即復生愈期難訂彼系真誠果即斂洞庭錢永泰子患痘毒醫用清火解毒之劑以一醫毒增六七再醫毒生二十醫至第二年孔皆有管日流臭漿右足縮不能行坐臥三載始來就治以陽和小金犀黃等丸與服內用化管藥半月愈半一月管化有多骨者亦出彼欲領子回家才以生肌散並調和氣血之丸與回任子率性欲食即與不洗即止不敷即停日以酸橙石榴等果消閒嚴冬復臭難聞余曰臭則爛香則生肌寒疽未斂日食酸澀領回三月患管復舊乃父母害之也婦乳患一白疽寒熱痛甚余以陽和丸同二陳湯煎服得睡痛息連進三服痊愈又婦患者相告伊弟亦習外科以夏枯花粉連翹橘葉等藥連服五劑號痛不絕延治余視向白色變微紅難以全消即書肉桂炮薑麻黃加二陳湯令伊煎服當晚痛止能睡明日皺皮縮小服下果然連進數劑患項不痛而潰貼陽和解凝膏收功木瀆鎮談姓婦背患如碗初起色白近已轉紅痛甚時值三伏余以陽和湯書畢旁人云此暑天緣何用麻黃髮表桂姜之熱劑余曰此陰症也彼云患色轉紅陰已變陽余因其說恐患家疑懼立令等候煎服服不逾時痛息接服四劑患消七分其有膿之三分不痛而潰五日收功一童十一歲手足臂腿及指頭面遍身浮腫數日後日增沉重以致氣喘不能眠偶有遠客令覓黃皮柑子一隻同酒釀二斤煎至將干去柑內核取連酒釀食之二次痊愈馬曰以上方案瑕瑜互見已於各症內聲明茲不贅述附家秘內科經驗速效方以上外科之治法並諸方藥業已和盤托出悉載前集所有家秘內科雜症亦藥到病愈萬無一失盡錄於下以添病者速愈之益爾調經種子湯歸身川芎吳茱萸各一錢熟地制香附各半錢白芍茯苓丹皮各八分元胡索陳皮各七分若經水先期者色必紫加條芩八分過期者色必淡加官桂乾薑熟艾各五分不落先期落後每服加生薑三片水一碗半煎八分俟經水至日空心服起以渣再煎臨臥服一日一劑服至經止兩三日交媾即孕經期准而不孕者以續斷沙參杜仲當歸益母草各二分川芎一錢砂仁炒研五分制香附二錢橘紅一錢種子紅花三分至期服四劑下期再服而孕求嗣得孕說昔褚澄言男精泄於先而女精後至則陰裹陽主男孕如女精泄於先而男精後至則陽裹陰主女孕又言月信初盡其濁氣未清而交媾即女務待經止兩足日則女體虛而濁氣盡再男人保養月餘陽勝於陰定成男孕又論子宮左右如男精泄於婦人之左生男右則生女此男清女濁男左女右陽壯陰衰之至論也凡疾風暴雨或醉飽或服藥石而受胎者多夭必俟天氣晴明日暖風和明星亮月而受胎者多富貴倘時令不正或迷霧氣怒而受胎者多愚蠢貧賤或雷電之後而受胎者定生怪物求嗣者慎諸手足不仁骨骱麻木甲尾片番木鱉各精製淨末二兩川附末一兩和勻每服七分用好陳酒五鼓送下醉蓋取汗服後痛處更痛麻處更麻頭眩背汗昏沉四五刻即定定即痊愈如服後不覺疼麻必要服至知覺方止手足骨骱疼痛用熟地四兩搗爛浸入滴花燒酒二斤隔湯頓熱以竹筷攪勻俟冷隨量日飲至愈飲時取所浸熟地過酒馬曰此方虛人可服如風濕入絡者不可用痛風遍身疼痛以當歸桂枝元胡索天麻各等分為末均五服酒送下可愈箭風用元胡索桂心當歸五靈脂木香白芷防風各一錢酒煎食遠服連服三日可以止痛雷頭風此諸藥不治之症也惟以山羊屎炒炭研粉酒送二錢甚效偏正頭風白芷三錢天麻一錢防風一錢荊芥錢半煎服即愈胃脘痛取鮮蒲公英瓦上炙枯黑存性研末每取五分滴花燒酒調團口含再以燒酒送咽痛息接服五日痊愈戒食生冷或用紅坊內好紅花四分棗頭十枚入水二碗煎至棗熟去花以湯棗食連服二十日永遠除根痞癖凡患痞癖之處肌膚定無毫毛須看準以筆圈記用密陀僧六兩阿魏五錢羌活一兩水紅花子麝香各三錢以香油一斤煎成膏退火攤貼患處新起者一膏而消年久者兩張而愈再以水紅花子三錢研末火酒二斤浸隨量時刻飲之至愈而止馬曰必藜藿之輩胃強體實者方可用婦女更當察脈辨症不可嘗試三日大瘧患日前用陽和解凝膏布攤貼背用常山雲苓官桂甘草檳榔各三錢小黑豆四十九粒酒水各二碗慢火煎剩兩碗當晚以一碗先服蓋暖而睡留一碗次日瘧前兩時頓熱服蓋暖臥待瘧至即至亦輕亦有當日而愈者愈後忌房事戒食生冷勞碌風霜忌食雞羊牛蛋白扁豆自慎半月永截不發小瘧減半馬曰常山雖治瘧有功然究竟太覺峻利頃附一方甚為神應可法也常山四兩陳酒五斤雞蛋七枚砂罐內煮熱瘧至時兩手握蛋冷則易換至熱退汗出而止久瘧用之神效莫測然而初起亦不可用黃疸凡患黃疸者眼白黃小溲赤遍體軟取黃豆生嚼不噁心者是用蒼耳子薄荷木通綿茵陳各三錢須原陳酒一斤煎一碗沖炒砂仁末三錢服如小便赤如血者加川連一錢同煎馬曰方亦平妥不若香鯽膏更為神應濕症用酒辨上方屢用愈人或有議之者謂癱瘓黃疸皆濕症應忌酒殊不知酒雖濕物今令其做緝濕捕善識濕穴領藥戰濕非酒不可或又謂經滴水而不效者何也答曰酒被水解捕猶賊阻也紅白痢凡痢不拘紅白忌用川連服則倒謂如腹痛而痢者不用別劑只用車前子炒研二錢檳榔川樸楂炭陳皮滑石甘草各一錢紅曲炒三錢澤瀉枳實各一錢燈心一撮以上十一味同煎另以木香六分酒磨以所煎藥湯加陳酒沖服可以立愈倘或增減定然不效如發不作痛惟痢膿血兼流黃漿此係平素愛食冷茶水酒滑腸等物致成積濕休息痢之症凡患者忌食水果水酒生冷海參海蜇等性寒之物須用活鱔魚去腸雜切段放瓦上炙炭研粉每服三錢黃糖拌熱陳酒送下數服痊愈不拘老幼滑腸久痢者神效馬曰恐有內痔須辨癡癲症附羊頭風凡患癡癲或羊頭風等症緣心竅中痰迷所致取橄欖汁十斤敲損入砂鍋煮數滾去核入石臼搗爛仍入原湯煎膩出汁易水再煎煎至無味去渣以汁共歸一鍋煎濃成膏用白明礬八錢研粉入膏攪和每日早晚各取膏三錢開水送服或初起輕者取橄欖咬損一頭蘸礬末入口嚼咽橄欖之味更美至愈乃止馬曰此方不特能治癡癲即小兒驚風后手足有時抽搐神呆目定均可服之吐血凡吐血多者覓三兩外重大全當歸一隻切細取好陳酒一斤慢火煎至一滿碗頓於鍋中以溫為妙候將要吐尚未吐口中有血含住取藥一口連血嚥下即此一劑而愈後不再發馬曰不嗽者可服吐血用酒辨每有醫家議云吐血尚要戒酒豈可酒煮當歸而服服則血噴不止如之奈何殊不知當歸二字之解當者當其時歸者引血歸經也全用定主引血歸經此方乃余家世傳活人多多從無一誤痰中帶血取活雄雞一百隻每日清晨空腹時以一隻殺血碗內趁勢嚥下忌加鹽百日而食百雞之血不可隔斷食完痊愈馬曰日殺一生亦太暴殄且亦未必即愈或用回龍湯頗有效驗咳嗽吧旦杏仁一兩泡去皮尖內有雙仁者棄之買新擂缽新研捶將杏仁搗爛如泥分為三服每服內加冰糖三錢共入蓋碗另用泉水煎滾衝入蓋片刻俟溫連仁末服下早晚各一次三服而愈如以杏仁同煎無效馬曰此方治燥痰久咳有驗冷哮江西白豆豉一兩白砒一錢皆為末用飯三錢研爛入末為丸如萊菔子大每取七粒白湯送下童子服可除根有年者經寒即發服可把定不哮馬曰此方治冷哮極驗然不得多服胃寒嘔吐黃水用生薑一斤搗取汁碗許入廣膠乳香末沒藥末各五錢同煎膠化離火取藥攤作三四大膏令貼胃脘痛處以絹綁縛三個時辰然後取周歲孩鞋兩隻爐上烘極熱輪熨熨至膏硬再易膏貼再綁三時熨至愈而止然後用紫厚朴三斤帶皮生薑二斤切片以水五升煮透去姜留樸火上焙乾再用生甘草二兩乾薑四兩依前煮之去草留姜連前所煎之樸炒燥共為細粉另以黑棗頭一斤用生薑二兩同棗煮熟取棗去皮核搗爛和藥末為丸曬乾每日早晚各服三錢白湯送下服完不發翻胃初起用陳皮土炒色黃香脆為度研為末每服三錢水煎飲之神效腸紅取花椒子炒磨粉黃糖拌每服三錢白湯送下服至愈止水瀉用炒焦蒼朮車前子各二錢焙楂炭厚朴土炒陳皮各一錢煎服立愈小兒減半小便閉此症乃氣閉非大小便不分也醫家每以澤瀉木通車前豬苓等藥全無一效余遇此症以歸身一兩川芎五錢柴胡升麻各二錢半水二碗煎八分一服即通曾救多人或孕婦及老年之人加人參一錢馬曰方極妥善大便燥結老年人或患癰毒大便燥結以四仁湯服之立效尿血頭裂當歸一兩以陳酒一升煎之一次服下即愈白濁牛舌頭草根即野甜菜又名禿菜根近水池處最多取根煎湯當茶飲或以湯煮粥食至愈乃止或用生白果三枚搗爛滾豆腐漿沖服夢遺六味湯內減去澤瀉增龍骨三錢研細水飛蓮鬚一兩芡實二兩線膠四兩用牡蠣粉炒成珠共研為末蜜丸每日早晚各取四錢鹿含草煎湯送服烏痧脹丁香雄精蒼朮硃砂各等分為末取蟾酥亦等分切片酒浸研漿和前末搗為丸如芥子細曬乾瓶貯每取七粒溫茶送咽立蘇小兒病症面黃腹大不瀉得食易吐名曰冷疳以丁香七枚為末人乳調蒸三四次薑湯送服可愈若吐瀉兼者橘紅丁香各等分為末蜜丸米湯送下若不瀉而頻吐不止者加姜半夏末麵漿糊丸薑湯送下疳臌食積取雞內金三十個忌經水瓦上炙無臭氣成炭存性研為細末再用炒車前子四兩研粉二物和勻以餳糖溶化與食食完痊愈忌食炒豆熬油結硬等物若遲治傷目或用田雞白水煮熟加薑末少許淡食至愈乃止小兒蟲症凡患蟲症當分別治之治紅蟲以烏梅兩個花椒三十粒煮湯服之然後用檳榔六兩黑醜白醜各二兩共為細末每取二錢黑糖拌食幼孩服錢半蟲可祛盡治肉鱉寸蟲以楝樹根肉青皮蒸透曬乾再蒸每服一錢白糖拌食幼孩服六分其蟲自絕馬曰必實見蟲症方可用小兒夜啼因穿蓋過暖遏熱所致諺云若要小兒安常帶三分飢與寒取雞屎塗臍中男雌女雄最妙或用真犀黃飛辰砂各五釐研末塗舌上立止急慢驚風辰砂輕粉各一錢殭蠶七條全蠍三個共研細用青蒿節內蟲搗和為丸如綠豆大臨用取一丸研細人乳調服馬曰方頗效驗啞驚天竺黃二錢麝香犀黃各四分雄黃殭蠶各一錢琥珀六分陳膽星四錢各為末用甘草鉤藤鉤煎膏為丸硃砂一錢為衣外加赤金每料均作四十丸每服一丸用燈心炭四錢薄荷煎湯送下或捉大蜘蛛一個炙存性研粉豬乳調服一半徐徐灌下馬曰一粒金丹亦驗然不可多服

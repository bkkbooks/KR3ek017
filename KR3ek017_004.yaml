body:
  text: 卷四煎劑類陽和湯治鶴膝風貼骨疽及一切陰疽如治乳癖乳岩加土貝五錢熟地一兩肉桂一錢去皮研粉麻黃五分鹿角膠三錢白芥子二錢薑炭五分生甘草一錢煎服馬曰此方治陰症無出其右用之得當應手而愈乳岩萬不可用陰虛有熱及破潰日久者不可沾唇二陳湯治流注初起橘紅五錢半夏二錢白芥子二錢炒研茯苓一錢生甘草三分加陽和丸同煎服千金內托湯治乳岩潰者並治一切潰爛紅癰最效陰症忌服黨參或用人參黃耆防風官桂川朴白芷川芎桔梗當歸生甘草分兩隨時斟酌煎服敗毒湯治紅腫成癰初起立消花粉黃芩連翹赤芍銀花歸身各二錢生甘草節一錢水酒各半煎好以醒消丸送下立消惟疔忌用酒煎奪命湯治一切疔毒一切癰腫銀花金線重樓即草河車黃連赤芍澤蘭細辛殭蠶蟬蛻青皮甘草羌活獨活防風分兩隨時斟酌煎服四仁湯治大便燥結吧旦杏仁火麻仁松子仁柏子仁各三錢各研末滾水沖蓋俟溫當茶飲如熱重加甘蔗汁半酒杯瀉熱湯治囊脫黃連六分黃芩歸尾連翹各一錢半木通甘草各一錢煎服桂薑湯治喉痛頃刻而起前無毫恙者此虛寒陰火之症也並治喉痹一切危急之症肉桂炮薑甘草各五分各研極細末滾水沖掉將碗頓於滾水內再掉慢以咽下立愈但先以鵝毛蘸桐油入喉卷痰痰出服藥更效又法以生川附切片塗以白蜜火炙透黑收貯瓷瓶臨如取如粞大一粒口含咽津立愈枸橘湯治子癰枸橘全枚川楝秦艽陳皮防風澤瀉赤芍甘草各一錢五分煎服龍膽瀉肝湯治牙癰龍膽草歸尾各二錢銀花花粉連翹黃芩各一錢半丹皮防風木通知母甘草各一錢煎服馬曰能瀉肝火解毒清暑湯治一切暑熱頭面生石癤連翹花粉赤芍銀花甘草滑石車前澤瀉各等分煎服外貼洞天膏補起即消潰者亦斂紫銀茶治楊梅結毒惡瘡復發者牛蒡子忍冬藤紫花地丁草白甘菊各等分煎服六味地黃湯治遺精並治一切潰爛不能斂口者立效熟地山萸山藥澤瀉丹皮雲苓煎服如治遺精刪去澤瀉加入龍骨線魚膠二味十全大補湯外症潰後老年虛弱者服黨參黃耆白芍冬朮肉桂雲苓歸身熟地川芎甘草或生或炙時議分兩隨酌煎服加味四物湯治毒根與保元湯同服更妙原方川芎白芍歸身熟地今加人參肉桂炒白芷五味子雲苓生甘草分兩隨酌煎服加味保元湯治解凝斂口並治毒根與四物湯同服原方人參炙草炙耆今加肉桂耆草宜用生忌炙蘇前湯治纏喉風並治一切喉症蘇子前胡赤芍各二錢甘草桔梗各一錢元參連翹浙貝各錢半煎服馬曰治風火喉症可用赤荊湯治纏喉風並治一切喉症先服蘇前湯次服此方川連甘草各一錢蘇梗牛蒡元參赤芍荊芥連翹黃芩花粉射干防風各一錢半煎服銀荷湯治纏喉風並治一切喉症連翹黃芩防風荊芥麝干各一錢銀花一錢半薄荷八分黃連甘草各五分煎服雙砂湯治骨鯁縮砂草果威靈仙各等分加砂糖少許清水煎服金烏湯治赤眼淹纏杜仲厚朴桑白皮檳榔各一錢不落水雄雞肝一枚去紅筋入白酒釀六兩隔湯燉熟去渣以湯與肝食隔兩日再服一劑立愈丸散類陽和丸治一切陰疽初起如紅癰腫痛者忌服肉桂一錢麻黃五分薑炭五分各研細末黃米飯搗爛為丸服之犀黃丸治乳岩橫痃瘰癧痰核流注肺癰小腸癰等症犀黃三分麝香一錢半乳香沒藥各去油各一兩各研極細末黃米飯一兩搗爛為丸忌火烘曬乾陳酒送下三錢患生上部臨臥服下部空心服馬曰犀黃丸久服必損胃氣有虛火者勿宜肺癰萬不可用乳岩瘰癧痰核等症亦不宜用醒消丸治癰腫聖藥立能消腫止痛並治魚肚癰及翻花起肛醉蓋取汗立愈乳香沒藥各去油各一兩麝香一錢半雄精五錢各研極細黃米飯一兩搗爛為丸如萊蔔子大忌火烘曬乾每服陳酒送下三錢醉蓋取汗立愈馬曰已成膿者萬不可用小金丹治一應流注痰核瘰癧乳岩橫痃貼骨疽善疒貢頭等症白膠香草烏五靈脂地龍木鱉各一兩五錢俱為細末乳香沒藥各去油歸身俱淨末各七錢半麝香三錢墨炭一錢二分亦各研細末用糯米粉一兩二錢同上藥末糊厚千槌打融為丸如芡實大每料約二百五十粒臨用陳酒送下一丸醉蓋取汗如流注將潰及潰久者以十丸均作五日服完以杜流走不定可絶增入者如小兒不能服煎劑以一丸研碎酒調服之但丸內有五靈脂與人參相反斷不可與參劑同服也馬曰實症可用夾虛者不宜又曰此丹祛痰化濕去瘀通絡極效五通丸凡大癰生於要緊穴道處將在發威之際服此甚效如與三黃丸間服更妙並治肚癰廣木香五靈脂麻黃乳香沒藥俱去油各等分各研細末黃米飯打和為丸如梧子仁大臨用以川芎當歸赤芍連翹甘草煎服送下五錢忌用參劑三黃丸治紅腫熱毒疼痛大癰懸癰楊梅瘡結毒等症制軍三兩酒浸隔水蒸軟打爛如泥乳香沒藥俱去油各一兩雄精五錢麝香錢半犀黃三分各為細末千槌為丸如梧仁大曬乾每服五錢連服十次立愈馬曰懸癰肛癰初起時用此最宜若先患咳嗽而後生者則非所宜子龍丸治瘰癧初起並治橫痃貼骨疽如瘰癧淡薑湯送下甘遂大戟俱研細末白芥子炒研細粉各等分煉蜜為細丸每日服三次每次服三分但甘遂與甘草相反斷不可同日服之馬曰子龍丸即古方之控涎丹只可施於壯實之人二三服後痰行即止久服必致泄利不食傷氣傷脾慎之梅花點舌丹治紅腫癰癤初起一丸即消龍膽冰片腰黃硼砂血竭葶藶沉香乳香沒藥各一錢破大珠子三錢牛黃麝香蟾酥人乳化硃砂各二錢各研細末為丸如胖緑豆大金箔為衣每服一丸以蔥白打碎陳酒送下醉蓋取汗飛龍丹即蟾酥丸小癤立愈白疽忌用寒水石蟾酥酒化蜈蚣去足各三錢血竭乳香沒藥雄精膽礬銅青殭蠶全蠍酒炒穿山甲各一錢紅砒枯礬硃砂冰片角刺輕粉各三分蝸牛二十一個各研細末以酒化蟾酥為丸金箔作衣大如緑豆蔥白包一丸酒送醉蓋取汗代刀散立穿一切外症角刺炒黃耆各一兩生甘草乳香各五錢各研細末陳酒送下每服三錢黎洞丸治跌打損傷腫毒危重之症內服外敷皆效山梨洞二字外國地名牛黃冰片各二錢半阿魏雄黃各一兩生軍乳香沒藥兒茶天竺黃血竭參三七各二兩各研細末以山羊血五錢拌曬乾透再磨為粉加藤黃二兩隔水煮透去淨浮膩丸如芡實大曬乾忌火烘以黃蠟為殼包裹臨用以一丸陳酒送服馬曰不及西洋十寶丹護心散治毒氣攻心並治狗咬緑豆粉一兩乳香五錢去油燈心炭三錢共研細末生甘草一兩煎濃汁攪調藥末令病者時刻呷咽咽至大半自然止嘔邪氣清爽接服醒消丸立愈角刺粥治橫痃角刺末六錢糯米二合布袋同盛煮粥如有鮮角膏者當用膏二錢同糯米煮粥日食至愈鮮角膏見敷藥門白芷散治乳癰乳癤乳香沒藥各去油白芷浙貝歸身各等分為末陳酒調服每服五錢醉蓋取汗洞天救苦丹治一應久爛不堪並瘰癧乳癰乳岩潰爛不堪者有子蜂窠露天者佳尖鼠糞楝樹子立冬後者佳青皮各等分炙研細末每服三錢陳酒送下隔二日再服愈馬曰此丹治藜藿之輩則可然潰爛不堪者亦不相宜大棗丸治久爛不堪將見內腑者服之立效並治瘰癧山羊屎炒存性大棗頭去皮核和勻分兩以好丸為度每服四錢用黑棗湯送下神仙棗治患瘡日久體虛如瘡最重者外敷瘡藥內服此方更為速效銀花歸身各一兩甘草三錢乳香去油五倍子黃耆白殭蠶白芷各五錢用水六碗煎剩一半取渣再以水六碗煎至一半共成六碗去渣代水以紅棗二斤煮熟均四五日食完紅棗丸治瘡臌大紅棗子四兩去皮核先煮三滾以棗湯洗淨殭蠶曬乾淨末二兩二味打和為丸以紅棗湯送下愈瘡棗治瘡症紅棗三斤豬板油一斤陳酒三斤共入砂鍋煮乾加水三斤煎至一半不時取食暑天均五六次煮雪梅丸治喉癬冰片犀黃各一分膽礬三分雄精硼砂山豆根兒茶各八分白梅二枚共打為丸均含十日聖靈丹治楊梅結毒廣瘡等症珍珠犀黃冰片各一錢鐘乳石二錢琥珀四錢劈砂三錢研粉飛面四兩各研極細勻和每服五分土茯苓調湯含再以湯送下馬曰方雖平淡而有奇功回疔散治一切疔走黃有子土蜂窠一兩蛇蛻一條不經地上者佳泥裹煅存性研細末白湯送下二錢馬曰回疔散能攻毒外出杜痔丸治外痔地骨皮生地各三兩黃芩丹皮各一兩半槐花焦蒼朮各一兩焦黃柏甘草各五錢共為細末白蜜為丸早晚每次每服五錢白湯送下雙鱉丸治痔管使其自出苦參四兩川連二兩酒炒當歸槐花蓽澄茄各一兩五倍子五錢六味共為細末另以馬蹄鱉二枚每重八九兩柿餅四兩二味水煮去鱉骨搗爛入前藥末打和為丸空心每服四錢白湯送下其管自出退管散治漏管自出或服雙鱉丸亦可黃荊條上子炙燥為末每服五錢拌黑糖陳酒送下至管出乃止敷藥類一筆消治癰癤白疽忌用大黃二兩藤黃一兩明礬蟾酥各五錢麝香沒藥乳香各二錢用蝸牛打爛作錠曬乾滴醋研磨以新竺蘸藥控患頂圈圍患處至消乃止拔疔線治一切疔毒番砂白丁香輕粉乳香蜈蚣各一錢血竭麝香各二錢金頂砒六分均研細末以蟾酥一錢酒化和打為丸作短線形刺疔出血插入疔孔平安餅治毒根凸起烏梅肉一錢輕粉五分同研不見粉亮為度如硬用津潤之斷不可用水研至成膏照患口大小作薄餅幾個以貼毒根外用膏掩日易一次俟毒根不痛落下乃止雄腦散治瘰癧敷藥樟腦腰黃各等分共研細末麻油調敷每日以荊芥根煎湯洗合掌散治遍身癩疥瘡毒並治陰囊癢繡球風硫黃一兩鐵鏽一錢紅砒六分共研極細如面以蔥汁調和塗入大碗內勿使厚薄以碗覆於瓦上取艾置碗下熏藥熏干敲碗聲與空碗聲無異為度將藥刮下再研極細臨用以右手中指羅門拈滿香油在包內黏藥塗入左手心中兩手合掌數摩只有藥氣不見藥形以兩手掌擦瘡每日早晚二次三日掃光再擦三四日永不復發二美散治癩疥膿窠間雜者吳茱萸焙硫黃各等分研極細如面照前合掌散法以香油蘸藥入左手心合掌磨擦每日二次愈後再擦三四日不發五美散治膿窠坐板濕毒臁瘡猴猻疳等症炒透東丹皮硝各一兩硫黃雄精各三錢輕粉一錢共為細末入洞天嫩膏調敷外以棉紙掩綁不可動揭五日後揭下再敷一二次痊愈如濕毒癢極先以金銀散敷上次以前膏加敷金銀散治惡瘡極癢硫黃一兩入銅器內化熔銀硃五錢入硫攪和離火倒油紙上冷透取研極細滴醋調敷止癢如破爛爛孔極癢者白蜜調敷掃雪散治蠟梨瘡獨核肥皂分開去核以洋糖填入巴豆仁每爿加二粒半將皂仍舊合好扎緊泥裹入火煅取出去泥研細加入輕粉檳榔末各八分再研香油調敷剃頭後以滾灰湯洗以藥敷至愈乃止金霜散亦名杏仁散治不癢惡瘡杏仁三錢去皮尖雄黃一錢半輕粉一錢研末豬苦膽調敷癬酒治一切諸癬本地白槿皮南星檳榔各一兩樟腦生木鱉各五錢斑蝥三十個蟾酥三錢上藥浸滴花燒酒一斤凡癬症三日一剃一拂至愈乃止蜈蚣油治蛀髮癬活蜈蚣三條菜油浸三四日先取生木鱉片浸數日入鍋煮透取湯洗髮洗後取蜈蚣油搽頭至愈方止或取草烏切片炙脆研細醋調日搽三次數日痊愈結子油治頭面肥瘡白明礬研粉鋪棉紙上卷作長條打成結子數個入菜油內浸透取油結子放鐵篩上用火燒結子內所滴下油仍滴於所浸油碗內燒至焦枯以諸結研粉加制松香末約一半共調油內日以拂瘡早晚兩次五六日愈戒食豬肉蝦蟹並忌煎炒熬油發毒等物食則延開難愈錦線油新增治湯火燙當歸生軍各一兩共為細末麻油調敷立愈紅油治鵝掌風及一切風症紅砒一錢敲細如粞以麻油一兩煎至砒枯煙絶為度去砒留油凡有風之處每日以烘油擦二三次乃愈刻歡丸治風火牙痛亦名過街笑蟾酥酒化透五靈脂麝香各一錢研和為丸約二百粒新綢包好絲線扎緊固藏勿泄香氣每取一丸咬於痛牙丸化即愈香清餅治小兒口疳生香附生半夏各等分共研細末蛋白調作餅貼男左女右湧泉穴一周時愈如小兒口內生毒塊不能食乳俗名螳螂子用生地酒浸打爛塗男左女右足心自愈水金散治舌上出血並治鼻衄茅柴根車前子血餘各等分為末吹擦即止以此煎服治尿血鼻衄加龍骨末吹鼻立止五寶散治生肌長肉人指甲五錢紅棗去核逐枚包入指甲以長髮五錢細扎同象皮薄片瓦上炙成圓脆存性取出研粉加麝香一錢冰片三分研細和勻瓷器固貯臨用以少許摻膏上神效推車散治多骨自出推車蟲即蜣螂炙研末每一錢入乾薑末五分再研極細吹入孔內次日骨出若吹過周時不痛者無骨出矣則知內無多骨也山蓮散治潰爛不堪者大活鯽魚一條去肚雜以山羊屎填實瓦上慢火炙乾存性研末加麝香一錢再研固貯如潰爛不堪與內腑只隔一膜者摻上立效象皮散治爛孔極大者並治刀傷跌損血出不止者豬身前蹄扇骨十兩煅炭研粉象皮炙炭存性研末一兩和勻固貯凡爛孔如掌大者摻上收小後用六和散敷六和散治爛孔收小者海螵蛸水飛龍齒象皮煅存性研極細血竭乳香輕粉各等分共研細末收貯或乾摻或用雞蛋熬油調拂紫金錠消癰腫通節竅消熱痰山慈姑去皮淨文蛤去末淨各三兩麝香一兩二錢千金子去油淨大戟洗淨焙各一兩共為極細末老米糊勻入臼千杵成膏作錠好醋磨塗並化服勝金散治潰爛並斧破傷人參三七研極細末塗患處消腫止痛患濕者乾摻五音錠治紅腫惡毒白疽忌用雄黃熊膽京墨硃砂各一錢麝香五分牛黃一分各研細末先將京墨用酒少許化之再入熊膽研膩後入諸末共研作錠臨用以清水磨以新筆蘸藥空頭圍患處全消無不神效觀音救苦丹治小癤疼痛硫黃三錢硃砂二錢共研細末入銅器熔化離火加入麝香一錢調和澆油紙上取作為米粒大如遇小癤取一粒放患頂以燃火點立刻燒過膏掩次日愈拔毒散拔一切毒巴霜雄黃麝香各一錢冰片五分共為細末摻膏上貼之則毒氣盡拔便無後患胎前産後之婦忌用消管方治漏管角刺尖炙柘樹膜各淨末五錢炙紅腹金錢鱉炙淨末三錢蟾酥榆面各一錢研極細末臨用以棉紙作條子量其管之深淺以津拌藥末卷上塞入管中乃愈枯痔藥治痔漏明礬一兩紅砒白砒各三錢共入陽城罐內外圍炭火燒至礬熔煙起即砒毒忌立上風聞氣俟煙盡礬枯去炭次日取出研粉每取一錢加水飛硃砂一分再研和勻臨用以津調藥時拂乃愈馬曰不必用槐梅膏治外痔蘇合油槐花粉各一兩猩膽冰片各五錢研和加嫩膏一兩五錢再研封固勿使泄氣臨用塗患處痛息日塗兩次內服枯痔丸方見丸散門鮮角膏治陰頑惡癬並治橫痃五月初旬取鮮皂角數斤打爛入鍋煮湯煎濃瀝出易水再煎二三度出渣以汁共歸一鍋慢煎成膏治橫痃煮糯米粥飲治頑癬加醋熬至稠膩洗剃後塗日剃日塗神效異常四妙膏治甲疽狼毒一兩黃耆二兩醋浸一宿入豬油五兩微火煎熬取二兩絞去渣退火氣以封患口日易三次毒消口斂麝蘇膏治一切大癰麝香當門子更佳五靈脂雄黃乳香沒藥各一兩蘇合油二兩蟾酥五錢洞天嫩膏八兩各藥研為細末與蘇合油嫩膏攪勻極和空頭塗圍患處如干以雞毛潤酒拂之神效內服醒消丸立愈扎藥治癰腫能拔毒止痛惟紅痛非常者不得已而用之白疽忌用萆麻仁打爛如泥以絹包好扎於患處惟無孕婦人及男子患陽症者可扎痛止即去他如千槌膏有萆麻仁鯽魚膏有巴豆二物提拔之力甚狠孕婦貼則墮胎白疽貼則成患敷藥治楊梅結毒人指甲血餘瓦上炙存性研細每粉一兩加麝香一錢再研日敷如初發以三黃丸每日五鼓時取四錢熱陳酒送下醉蓋取汗或以瀉肝湯每日早晚輪服馬曰此方能長肉收口極效然火毒甚時早用之反有損吹藥類壁錢散治熱症喉痛六七月中取有子壁蟢窠七個老壁蟢二個以發扎好用明礬七分熔化將扎好之壁蟢入熔礬中黏足燈火炙透研粉吹喉立愈珍珠散治牙疳牙根紅腫口喉等症硼砂雄精川連兒茶人中白冰片薄荷黃柏各等分大破珠減半各為極細末以刀點之吹之立效赤霜散治走馬牙疳延爛穿腮不堪危險者紅棗一枚去核入如黃豆大紅砒一粒絲線扎好放瓦上炙煙盡為度取以悶熄冷透研細加入冰片一分再研吹之速效久爛之孔生肌亦速馬蹄散治同赤霜散白馬前蹄刮下腳皮炙炭存性加冰片少許吹之南星散治牙蝕因患骨槽風所致並透骨穿腮南星一枚挖空入雄黃一塊面白糊固火炙俟雄熔以杯合定冷透去面加麝香少許共研細拂患處數日愈固齒散治齒牙搖動用鼠之頭骨及鼠牙鹽煅存性研細擦之即收上最固最利也馬曰須用全鼠一個連皮肉炙枯存性入片少許治虛火牙痛神驗且能固齒亦奇方也取齒丹取牙立落活鯽魚一條約十兩重白砒一錢入魚腹懸之無貓犬及無風雨處七日後魚身發白毛雞羽拂下以膏藥滋少許收拌每遇病牙以膏藥少許貼於患齒片刻落下淨湯漱口馬曰取齒靈驗四黃散治口舌之症後二冬犀黃散亦皆治口舌荊芥山梔大力黃連黃芩連翹薄荷木通蒲黃各一錢燈心一撮甘草四分共研細末擦患處立愈二冬散治口舌生疳久患不愈天冬麥冬各去心元參各等分研細末為丸含齒舌間丸化即愈犀黃散治舌硬生衣牙關不開犀黃一分硃砂一分元精石二兩和勻研極細末吹之立愈燈心散治骨鯁立愈活竹一段留兩頭節一節上刻一眼以燈心塞實仍封固眼裹濕草紙火煨取出俟冷剖開去竹炭取燈心炭研細吹三四次即愈再服雙砂湯更妙方見煎劑門聤耳散治耳內有膿作痛鮮鰉魚腦中枕骨俗呼鰉魚牙齒煅研每一兩重加冰片一錢先卷干膿水吹三四次立愈膏藥類陽和解凝膏治一應陰疽流注潰爛不堪及凍瘡毒根等症未潰者一夜全消已潰者三張痊愈瘧疾貼背心立愈鮮大力子梗葉根三斤活白鳳仙梗四兩大麻油十斤先煎至枯去渣次日用川附桂枝大黃當歸肉桂官桂草烏川烏地龍殭蠶赤芍白芷白蘞白芨各二兩川芎續斷防風荊芥五靈脂木香香櫞陳皮各一兩再煎藥枯瀝渣隔宿油冷見過斤兩每油一斤用炒透桃丹七兩攪和明日文火再熬至滴水成珠不黏指為度以濕草紙罨火移鍋放冷處將乳香沒藥末各二兩蘇合油四兩麝香一兩研細入膏攪和極勻出火氣半月後攤貼洞天鮮草膏治一切熱毒癰癤乳療乳癰等症大麻油三斤先熬壯年頭髮一斤熬至發枯浮去渣再用活牛蒡甘菊蒼耳草根葉忍冬藤馬鞭草仙人對坐草鮮草各一斤再另用油十斤將各草熬枯瀝出再以白芷甘草五靈脂當歸各八兩入鍋熬至藥枯出渣俟冷併入前煎頭髮油每油一斤用當時炒透桃丹七兩加入攪勻熬至滴水成珠不黏指為度離火俟退火氣以油紙攤貼嫩膏每油一斤入炒透桃丹四兩熬至黑色為度白玉夾紙膏治夾棍瘡杖傷槍棍損傷為效甚速麻油四兩熬成珠加制好松香五錢白蠟黃蠟各二錢半再熬去煙抹用絹瀝清一加輕粉一兩研細二加冰片三分三加麝香三分隨攪隨和勻極增雞蛋白一個再攪勻瓷瓶貯蠟封口聽用如過兩月後藥干無用矣化核膏治瘰癧結核惡核貼之即消倘毒根不除必以子龍丸日服三次外貼此膏方可除根以杜後發壁虎十四條蜘蛛二十八個蝸牛三十六枚大麻油四斤熬枯三物浮於油麵撈去再入首烏藤葉甘菊根薄荷牛蒡蒼耳等草俱用鮮者各半斤武火熬至草枯出渣俟冷再入連翹元參苦參白蘞白芥子殭蠶水紅子仁各打碎大黃荊芥防風各四兩浸一宿再熬至黑枯以油瀝清見過斤兩熬至滴水不散將另制木鱉油歸入配炒透東丹慢入慢攪攪勻文火再熬熬至滴水成珠加入丁香油一錢麝香二錢蘇合油一兩攪勻退火氣攤貼白花膏治癢極見骨者並臁瘡孔內發癢者香油一斤青槐枝一百段次第入油熬枯去枝俟至滴水不散加入黃蠟澱粉各一兩五錢離火溫時再下制淨乳香沒藥兒茶白花蛇各三錢潮腦一兩麝香一錢同油攪勻成膏浸水內一宿攤貼紫微膏治生肌收口香油四兩燭油一兩五錢黃蠟一兩五錢熬至滴水不散離火入炒鉛粉三兩再入輕粉乳香沒藥阿魏白蠟雄黃龍骨珍珠各五錢兒茶六錢攪勻遠火再入麝香五錢成膏聽用以此生肌收口最效咬頭膏咬穿毒頭神效銅青松香乳香沒藥杏仁生木鱉粉萆麻仁各等分巴豆不去油焙用共打成膏每兩膏內加入白砒一分再攪勻臨用取緑豆大一粒放患頂用膏掩之潰即揭下洗淨換膏貼之胎前産後忌用烏金膏治爛腿日久不愈者烏鉛每一斤用白砒三錢熔化次日鉛面刮下者名曰金頂砒再以鉛熔澆薄如紙片照患孔大小剪如膏藥一方針刺二三十眼取光面貼孔上每日煎紫花地丁草湯洗孔並洗膏二次三日內毒水流盡色變紅活以水飛伏龍散摻上仍用前膏貼外戒多立行走房事食毒物凡婦人須待月信之後貼起馬曰以上各方皆平穩可用此書治病方法皆是神妙異常方有活鴨癩團田螺鯽魚蜘蛛蜈蚣等物因不得已而用之或病勢不甚重者不必用此活物可免殺生之孽附新增馬氏試驗祕方白金丸治喉風乳蛾白礬研細川鬱金研細上等分共和勻皂角汁為丸喉科祕藥治咽喉七十二症俱用此吹之立效黃柏焙黃芩焙梔子焙綿黃耆曬川黃連焙蘇薄荷防風荊芥元參連翹殼細辛香白芷川芎羌活獨活三奈檳榔川厚朴苦參粉甘草木通製半夏川烏草烏茅蒼朮麻黃赤芍升麻大黃殭蠶牛膝桔梗射干乾葛皂角刺車前子桑白皮五加皮鼠黏子地骨皮莧麥冬山豆根杏仁大生地當歸尾天花粉天南星金銀花川槿皮參三七各一兩揀上好潔淨咀片用好新缸一隻將藥入內加清水浸之日曬夜露四十九日取起濾去渣用銅鍋煎之將藥水逐漸加入用文武火熬不住手用槐柳枝攪之煎稠如糊再加入後開各藥雄黃五錢青礞石童便煅七次乳香炙去油沒藥炙熊膽焙龍骨煅元明粉血竭石燕醋煅七次海螵蛸紙包煨蘆甘石童便煅七次青黛各五分枯礬兒茶各一錢輕粉黃丹水飛各三分桑枝灰三錢硼砂七分上為細末入煎膏內和勻做成小餅如指頭大曬露七曉夜放地上以瓦盆蓋之一日翻一次七日取起置透風處陰乾收藏瓦罐內三個月方可用之用時為極細末每二分加後七味大梅片濂珠珊瑚各四分麝香犀牛黃各二分輕粉一釐硼砂二分共為末和勻密收小罐以烏金紙塞罐口每以銅吹筒取藥少許吹患上咽喉諸症皆獲神效又方加鮮車前草紫背天葵草骨牌草金星草五爪龍草土牛膝草地丁草各二兩土牛膝草用四兩同黃柏等藥浸缸內西洋十寶散治刀刃傷並各器械傷皮破出血者以藥沒糝上包固不可見風血止即愈治跌打損傷皮肉青腫未破者用陳醋調敷患處腫消即愈治內傷骨碎或骨已斷折先將骨節湊準用陳醋調敷患處以紙包裹外加老棉絮包好再用薄板片夾護將繩慢慢繫緊不可移動藥性一到骨自接矣須靜百日勿犯房事犯則必成殘疾治刃傷深重未致透膜者先用桑皮紙線縫好多糝藥末於上以活雞皮急急調護如前骨損養法即愈治跌打昏迷不醒急用一錢同陳酒沖服自然醒轉以便調治此方神奇雖遇至重之傷鮮有不起死回生者照方醫治調養勿臥熱炕定有奇效寶之真血竭一錢六分明雄黃四錢上紅花四錢淨兒茶二分四釐辰州砂一錢二分淨乳香一錢二分當歸尾一兩淨沒藥一錢四分當門子三釐大梅片一分二釐上十味共為細末入乳鉢研至無聲收入瓷瓶黃蠟封口勿令泄氣香鯽膏專治黃疸烏背鯽魚一尾須活著約重三四兩連腸雜鱗翅入石臼內搗爛加當門子三分再搗勻攤布上貼肚臍眼上次日取下重者貼二三枚貼後即有黃水流出為妙回生丹專治跌打有起死回生之功活地鱉瓦上炙微黃研末五錢自然銅瓦上煅紅醋淬九次淨三錢滴乳香一兩用燈心二錢同炒枯吹去燈心研取三錢真血竭水飛二錢硃砂水飛二錢巴豆霜用巴豆去殼紙包壓淨油白如雪取霜二錢當門子三分以上研和瓶貯勿泄氣大人每服一分五釐小兒七釐酒沖服牙關緊者挖開灌之即活再下一服即愈大麻風湯藥方陳皮海桐皮秦艽薏仁米苦參香白芷牛膝防風川續斷荊芥羌活風藤當歸蒼朮連翹殼生甘草廣木香各一錢入薑棗煎服丸藥方大胡麻念兩小胡麻念兩牛膝四兩蒺藜念兩苦參十六兩防風八兩荊芥八兩全當歸六兩蒼朮六兩薏仁米四兩川續斷四兩共研細末水泛為丸毛尖茶下每早午晚各一服每服三錢或二錢另加後丸楓子膏方大楓子去殼銅鍋炒至三分紅色七分黑色太過無力不及傷目炒後研膏入紅糖等分熬四五滾倒紙上放地上出火氣每丸藥一錢春秋用膏八釐夏六釐冬一分同吞服

body:
  text: 卷一癰疽總論癰疽二毒由於心生蓋心主血而行氣氣血凝而發毒毒借部位而名治論循經則誤症之根盤逾徑寸而紅腫者謂癰癰發六腑若形止數分乃為小癤按之陷而不即高雖溫而頂不甚熱者膿尚未成按之隨指而起既軟而頂熱甚者膿已滿足無膿宜消散有膿勿久留醒消一品立能消腫止疼為療癰之聖藥白陷者謂疽疽發五臟故疽根深而癰毒淺根紅散漫者氣虛不能拘血緊附也紅活光潤者氣血拘毒出外也外紅里黑者毒滯於內也紫黯不明者氣血不充不能化毒成膿也膿色濃厚者氣血旺也膿色清淡者氣血衰也未出膿前腠理之間癰有火毒之滯疽有寒痰之凝既出膿後癰有熱毒未盡宜托疽有寒凝未解宜溫既患寒疽酷暑仍宜溫暖如生熱毒嚴冬尤喜寒涼然陰虛陽實之治迥別閲古方書總覺未詳因暢其旨備覽焉諸疽白陷者乃氣血虛寒凝滯所致其初起毒陷陰分非陽和通腠何能解其寒凝已潰而陰血乾枯非滋陰溫暢何能厚其膿漿蓋氣以成形血以華色故諸疽平塌不能逐毒者陽和一轉則陰分凝結之毒自能化解血虛不能化毒者尤宜溫補排膿故當潰膿毒氣未盡之時通其腠理之功仍不可緩一容一縱毒即逗留一解一逐毒即消散開腠而不兼溫補氣血虛寒何以成膿猶無米之炊也滋補而不兼開腠僅可補其虛弱則寒凝之毒何能覓路行消且毒盛者反受其助猶車粟以助盜糧矣滋補而不兼溫暖則血凝氣滯孰作釀膿之具猶之造酒不暖何以成漿造飯無火何以得熟世人但知一概清火而解毒殊不知毒即是寒解寒而毒自化清火而毒愈凝然毒之化必由膿膿之來必由氣血氣血之化必由溫也豈可涼乎況清涼之劑僅可施於紅腫癰癤若遇陰寒險穴之疽溫補尚虞不及安可妄行清解反傷胃氣甚至陽和不振難潰難消毒攻內腑可不畏歟蓋脾胃有生死故首貴止痛次宜健脾痛止則惡氣自化脾健則肌肉自生陽和轉盛紅潤肌生惟仗調和補養氣血之劑若夫性寒之藥始終咸當禁服馬曰數分之癤亦須看生在何處若在險要穴上亦不可小視誰謂數分之癤無害耶又曰白陷者乃是痰症發於肉裡由於氣滯而成若堅凝附於筋骨者乃血分受病必初起紅硬有頭方謂之疽然亦須辨陰陽又曰有陰虛陽旺之輩毒火結於榮分瘡堅平色紫按之烙手者必泄其火毒陰充血和方能起發豈可謂之寒疽治以溫暖乎投之則陰愈干則火愈熾診視之時全在察脈觀色觀形切宜填之又曰毒概指為寒左矣須知陽中有陰陰中有陽有真寒假熱有真熱假寒如執色白之説則有色白按之烙手脈洪數者將其作疽治歟泥色紅之説其有色紅按之不熱脈不洪數者其將作癰治歟若不諳脈理何能無誤耶陶曰中國之瘡毒西國則稱之為發炎有內炎外炎之名外炎即癰疽內炎即肺癰腸癰等類用蜞數條放在腫處吮去其毒又曰如癤生在險要穴上用廣東所産金殼櫛水研搽可移於不致命一二寸但此藥有毒不可入口又驗方新編癰毒雜治門內有移山過海散趕毒散皆能移開瘡於不致命處又曰徐靈胎亦云紅亦有非癰白亦有非疽者部位論名但論部位而名癰疽雖未分辨虛實然諸名色後學亦應知之即如毒生頭頂而有善疒貢發疽之名頸項有落頭對口腦疽之號鴨蜒因毒夾於腋中魚肚緣患生於腿肚失榮獨在項間夾疽雙生喉側腳骨號夾棍之瘡潰爛肌膚則為驢眼足心為湧泉之穴毒匿腳皮則成牛𪳕腹癰指正箭袋云偏臭田螺大拇指之爛名扁擔怪肩穴中之癤毒鬢前疽耳後發腿曰腿癰下稱跨馬白謂冬瓜手發背腳丫疽偷糞老鼠又號懸癰漏稱海底指説蛇頭甲謂甲疽膝蓋腫云鶴膝腎子疼曰子癰馬刀癰生於臉上骨槽風患於牙床井泉疽患登心口貼骨疽毒踞環跳臀積毒則曰臀疽臂上癰乃云臂毒諸名由部位以推治法憑白紅而別初起未潰當觀現在之形已潰爛久須問始生之色初發色紅仍施癰藥初生色白當用疽丹各症治法逐列於後使學者辨症而精治焉馬曰初起屬陽潰久血氣衰變為陰寒者斷不可仍施癰藥爛潰不斂如久潰腐爛不堪以洞天救苦丹三服每服三錢陳酒送服醉蓋取汗隔兩日又送一服再隔兩日再送一服所隔之兩日每日以醒消丸三錢陳酒送服服後毒水流盡七日後再服醒消兩次接服大棗丸每日早晚各進五錢雖危險者亦可奏效馬曰丹方治梅毒濕毒諸瘡爛潰一片有數十孔流臭水者可服如癰疽爛潰雖有數十孔爛成一片則不可用患孔毒根爛孔有惡肉凸起名曰毒根往往有用降藥爛去者此乃毆之速斃也獨不知弱體豈可增痛況爛去仍又長出安可再爛余所制平安餅專貼毒根外以陽和解凝膏貼掩一日一易輕者二三日重者六七日不癢不痛毒根自落貼餅時日服托毒散俟毒根落後當服保元四物二湯收功馬曰此症乃瘡中有火所致不若用銅緑煅研極細陳去火毒摻之上用膏蓋可以平也翻花起肛潰久不斂必至翻花起肛堅硬取老蟾破腹連肚雜以蟾身刺數孔貼患口上輕者日易一次重者日易兩次貼蟾之日日服醒消丸三錢陳酒送服止其疼痛三日後毒盡再服醒消丸消其翻花軟其硬肛如大患初潰者亦如前法毒從蟾孔而出倘肛口硬患孔深取活牛蒡草根枝葉或取紫花地丁草軟者搗爛塗入肛內拔毒平肛功效不凡馬曰此症用蟾破貼頗效毒氣攻心凡受降藥之毒定致神昏嘔吐此係毒氣攻心急用護心散以生甘草一兩煎濃汁稠調令病者時刻呷咽咽至大半自然止嘔神氣清爽接服醒消以平其勢馬曰瘡毒攻心亦令神昏嘔吐至於降藥之毒須用人中黃貫衆緑豆解之最佳陰症門陰疽論陰毒之症皮色皆同然有腫有不腫有痛有不痛有堅硬難移有柔軟如綿不可不為之辨夫腫而不堅痛而難忍流注也腫而堅硬微痛貼骨鶴膝橫痃骨槽等類是也不腫而痛骨骱麻木手足不仁風濕也堅硬如核初起不痛乳岩瘰癧也不痛而堅形大如拳惡核失榮也不痛不堅軟而漸大癭瘤也不痛而堅如金石形如升斗石疽也此等症候盡屬陰虛無論平塌大小毒發五臟皆曰陰疽如其初起疼痛者易消重按不痛而堅者毒根深固消之難速治之之法方有一定學者覽之瞭然馬曰柔軟如綿乃氣與痰滯治宜流氣氣行痰即行流注一名氣毒又名串痰又曰乳岩失榮馬刀乃七情致傷之症治宜解鬱疏肝不可照陰疽例治陰疽治法初起之形闊大平塌根盤散漫不腫不痛色不明亮此疽中最險之症倘誤服寒涼其色變如隔宿豬肝毒攻內腑神昏即死夫色之不明而散漫者乃氣血兩虛也患之不痛而平塌者毒痰凝結也治之之法非麻黃不能開其腠理非肉桂炮薑不能解其寒凝此三味雖酷暑不可缺一也腠理一開寒凝一解氣血乃行毒亦隨之消矣學者照方依治自無不愈倘有加減定難奏效馬曰治法極是又曰麻黃未潰可用已潰之後斷不可重開其腠理流注此症色白腫痛毒發陰分蓋因痰塞清道氣血虛寒凝結一曰寒痰一曰氣毒其初起皮色不異惟腫惟疼體雖發熱內未成膿以二陳湯加陽和丸同煎數服全消消後接服小金丹七丸杜其續發如皮色稍變極痛難忍須服陽和湯以止其痛消其未成膿之餘地使其已成膿者漸至不痛而潰此乃以大疽變小之法如患頂軟即為穿之膿多白色以陽和膏日貼但此症潰後定增毒痰流走患生不一故初潰之後五日內仍服小金丹十丸以杜後患接用犀黃丸陽和湯每日早晚輪服使毒痰消盡不補亦可收功倘孩子不能服煎劑者初起以小金丹化服至消乃止成膿者亦服小金丹消其餘硬之地使患不痛即為穿之俟其毒盡用保元湯耆草宜生忌炙加入肉桂五分日服收功如孕婦患之當問懷胎月數倘未滿六個月犀黃丸有麝香不可服當以陽和湯愈之愈後再服三四劑以代小金丹杜其流走馬曰此症濕痰凝滯者固當溫散其有動勞之輩不受外寒內傷脾土脾氣滯而不行濕痰因之停滯治當流氣行痰可望消散又曰流注生於夏令太陰司天在泉之歲最多曝日躬耕夜天露臥暑為寒束氣道不行隨處結腫初起宜從汗解萬靈丹最妙數服後不應再進陽和若壯熱煩渴引飲全是暑熱內蘊小金陽和豈可沾唇馬曰陽和湯孕婦忌服即小金丹亦非所宜甲疽凡指甲邊生一赤肉突出時常發者甲疽也用四妙膏以封患口日易三度毒消口斂井泉疽疽生心口又名慢心鋭毒初起心口內有塊漸大發高毒陷即死此醫皆縮手之症諸書亦無治法惟余家祕集載以本人兩手十指以線量其長短共積於線在喉管正中處雙環至背脊之中看兩線頭盡處為中穴又以本人中指之中一節用柴心量準若干於中穴之左右兩旁各遠若干各以墨記分立三穴如每穴用艾三大壯一齊火灸灸畢痊愈馬曰井疽乃心火妄動而生慢心毒即胃脘癰方書俱有治法又曰井泉初起亦非死症不過易於成漏後難收口耳瘰癧患生項間初起一小塊不覺疼癢在皮裡膜外漸大如桃核旁增不一皮色不異以子龍丸每服三分淡薑湯送服每日三次至消乃止倘小孩不善服丸每取小金丹一丸陳酒沖服蓋暖取汗服至消而止數年內忌食香橙食則復患凡瘰癧有潰爛間有成膿未潰者亦有未成膿者須服犀黃丸止其已潰之痛松其成膿未潰之脹消其未成膿之核已成膿者用咬頭膏穿之日服溫補祛痰通腠活血壯氣之劑外貼陽和解凝膏而愈凡瘰癧爛延肩胸脅下極不堪者用荊芥根煎湯洗患處以雄腦散麻油調搽內服洞天救苦丹三服犀黃丸六服服完九日後皮色變白孔內紅活接服大棗丸肌肉漸長用生肌散日敷收功凡瘰癧爛至咽喉如飲熱湯外覺熱痛者乃危險至極遲則爛穿咽喉不救急取柴心一根量本人中指量其三節共若干長短男左女右再就其手下腕骨正中骨頂之處即以所量中指之柴心定準一直量上盡頭乃肘髎穴也以墨記定取艾團連灸三壯膏掩可保咽喉不穿凡瘰癧大忌開刀收功之法前已列明敷藥有訣陳下未成膿者灸則可消爛潰者可斂赤貧人用之有訣瘰癧爛潰不堪言爛至胸腰連耳肩荊芥根煎溫復洗瘡中紫塊莫針穿犀黃大棗丸神效日服日洗日敷痊樟腦腰黃等細粉麻油調掃肉新鮮馬曰瘰癧皆不足之症有陰虛肝火凝結者有脾虛痰氣凝結者有風痰風濕相結者子龍丸乃化痰泄水之峻劑只可施於壯實之人但有一二核堅硬者可服亦不宜多服致傷血氣小腸疽患在小腹之內按之如掌堅硬而熱微痛小便頻數汗出憎寒腹色如故或現微腫以犀黃丸愈之馬曰此症以散瘀利濕為主當服煎劑不得已以犀黃丸括之鶴膝風初起膝蓋骨內作痛如風氣一樣久則日腫日粗而大腿日細者是也因形似鶴故名專治之法取新鮮白芷用酒煎至成膏收貯瓷瓶每日取膏二錢陳酒送服再取二三錢塗患至消乃止否則用陽和湯日服外以白芥子為粉白酒釀調塗亦消馬曰鶴膝乃三陰不足有外受風寒脾濕下注而成者有肝腎陰虧濕熱下注而成者陽和湯不宜即白芷白芥子等品有熱者亦不可用橫痃生於小腹兩旁大腿界中形如腰子皮色不異硬如結核按之微痛者是也日取角刺粥時飲三四日全消或以子龍丸每服三分淡薑湯日送三次痊愈乃止大忌開刀開則刀口無膿惟出白膩漿三百日內必死自潰者亦然馬曰橫痃之症乃敗精濕痰凝結而成角刺及子龍丸似非宜用乳岩初起乳中生一小塊不痛不癢症與瘰癧惡核相若是陰寒結痰此因哀哭憂愁患難驚恐所致其初起以犀黃丸每服三錢酒送十服痊愈或以陽和湯加土貝五錢煎服數日可消倘誤以膏貼藥敷定主日漸腫大內作一抽之痛已覺遲治若皮色變異難以挽回勉以陽和湯日服或以犀黃丸日服或二藥每日早晚輪服服至自潰用大蟾六隻每日早晚取蟾破腹連雜以蟾身刺孔貼於患口連貼三日內服千金托裡散三日後接服犀黃丸十人之中可救三四潰後不痛而癢極者斷難挽回大忌開刀開則翻花最慘萬無一活男女皆有此症馬曰乳岩乃心肝二經氣火鬱結七情內傷之病非陰寒結痰陽和湯斷不可服服之是速其潰也潰則百無一生惟逍遙散最為穩妥且犀黃丸內有乳香沒藥麝香辛苦溫燥更當忌投貼骨疽患在環跳穴又名縮腳疽皮色不異腫硬作痛者是外用白芥子搗粉白酒釀調塗或以大戟甘遂二末白蜜調敷內服陽和湯每日一劑四五服可消消後接服子龍丸或小金丹以杜患根大忌開刀開則定成縮腳損疾馬曰貼骨疽用陽和湯是正理可法也骨槽風患在腮內牙根之間不腫不紅痛連臉骨形同貼骨疽者是倘以癰治則害之矣初起最易誤認牙疼多服生地石膏以致成患爛至牙根延及咽喉不救當用二陳湯加陽和丸煎服或陽和湯消之倘遇潰者以陽和湯犀黃丸每日早晚輪服如有多骨以推車散吹入隔一夜其骨不痛自行退出吹至次日無骨退出以生肌散吹入內服保元湯加肉桂歸芎耆草宜生收功而止馬曰骨槽風生於牙關開合處名頰車穴如堅硬貼骨按之不熱可服陽和湯惡核痰核大者惡核小者痰核與石疽初起相同然其寒凝甚結毒根最深極難軟熟未潰之前忌貼涼膏忌投涼藥惟內服陽和湯犀黃丸可消亦有以大田螺搗爛敷塗消之者大忌開刀開則翻花起肛用大蟾破腹刺數孔連雜蓋患拔毒軟肛內服溫補托毒消痰之劑犀黃丸儘可收功如孕婦丸內有麝香忌之馬曰惡核難潰斂即服藥亦難取效大忌開刀洵是至言石疽初起如惡核漸大如拳急以陽和湯犀黃丸每日輪服可消如遲至大如升斗仍如石硬不痛又曰久患現紅筋則不治再久患生斑片自潰在即之證也潰即放血三日內斃如現青筋者可治內服陽和湯外以活商陸根搗爛加食鹽少許敷塗數日作癢半月皺皮日敷日軟而有膿袋下以銀針穿之當服千金托裡散加熟地同生耆各一兩代水煎藥服十劑後以陽和解凝膏滿貼患上空出穿針之眼使其血活若皮膜中似成膿巷用布綁緊使皮膜相連內服大補保元等湯參耆忌炙服至收功如其毒氣未盡忌投補劑馬曰現青筋者亦不可治商陸根雖能潰堅用之皮腐入鹽更痛徒傷其肌徒增其痛未必能消只有服補養氣血之劑以解陰凝庶可保延歲月善疒貢頭孩子頭髮內患白色腫塊初起伊母認為跌腫至高大作疼方始延醫醫以頭為首陽惟用寒涼解毒是以潰者內膿復疒貢增出者不一殊未知此患色白其膿不紅乃陰寒虛弱之症用小金丹治之初起三服而消潰後七丸而愈外貼陽和解凝膏大人患之名曰發疽以陽和愈之馬曰此症初起當服疏風清痰熱之劑陽和湯似不宜用又曰善疒貢頭系風熱痰交結而生大人亦有之陽和湯不可用也鵝掌風患於手足掌指皮上硬而癢燥烈者是用紅油於有風之處日以火烘油擦二三次至愈而止用麻油一兩紅砒一錢敲細如粞入油煎至砒枯煙絶為度去砒留油有風之處日以火烘油擦二三次至愈止鵝爪風即油灰指甲即日取白鳳仙花搗塗指甲上下包好日易一次塗至灰甲換好而止凍瘡以陽和解凝膏貼一夜可愈潰者貼三張收功陰疽用膏議凡患一應色白大小等疽忌用洞天膏貼嫩膏敷用則寒凝愈結最忌用千捶膏鯽魚膏貼蓋此二膏內皆有巴豆萆麻貼則被其提拔助成每見橫痃乳岩貼至致命孕婦貼則墮胎凡諸疽潰後宜貼陽和解凝膏陽症門癰癤凡患色紅腫疼痛根盤寸余者是癰毒發三四日尚未作膿以嫩膏圍外內以醒消丸熱陳酒送服三錢即止其疼痛夜間得睡次日患皮起皺再服全消如過四五日患將作膿亦以醒消丸與服消其四圍腫硬痛息毒散患啞此以大變小之法有膿之患頂取咬頭膏貼加以代刀散三錢酒服穿之或刀點分許穿之以洞天膏貼不幾日收功如患盤數寸者或患居背心腦後腰腹肚腋陰囊等險之穴用五通丸醒消丸早晚以敗毒湯輪送一次皮皺痛息再服至愈倘潰即用托毒散醒消丸亦早晚輪服如患盤不滿一寸亦紅腫者是癤蟾酥丸梅花點舌丹皆可消腫止痛馬曰此治法極是又曰腰腹肚腋等處癰癤五通醒消二丸最佳牙癰牙根肉紅腫痛甚者是刺出毒血取珍珠散吹之內服龍膽瀉肝湯而愈倘牙骨及腮內疼痛不腫不紅痛連臉骨者是骨槽風也倘以癰治則害之矣故治病貴在識症馬曰牙癰乃胃火風熱交攻膿出即愈至腮頰之腫不退外潰則成穿腮漏發頤遮腮患生於腮有雙有單一曰遮腮一日發頤當宜別治腮內痠痛是遮腮取嫩膏敷上次日痊愈倘病仍兩腮發腫不痠痛者是發頤宜服表風散毒之劑當用白芷天麻防風荊芥各一錢陳酒煎半碗送服醒消丸而愈馬曰遮腮以疏風清胃為主如病後發頤起耳根之下腫連腮項乃少陽邪熱結聚須兼顧本症天麻白芷防風醒消均非所宜蓋此症發於溫熱病中未能發汗解肌熱病最易傷陰故不得以辛溫治之子癰腎子作痛而不升上外現紅色者是也遲則成患潰爛致命其未成膿者用枸橘湯一服即愈馬曰子癰與囊癰有別子癰則睪丸硬痛睪丸不腫而囊腫者為囊癰枸橘等品正治子癰之法囊脫陰囊生毒爛破腎子落出外用紫蘇湯日洗取紫蘇葉梗為末日敷用青荷葉包裹內服瀉熱湯馬曰瀉熱湯治囊脫頗效可用赤遊螳螂子初生小孩因胎中受毒腿上患色紅腫成片身熱名曰赤遊遊者遊走也遊走遍身而死取哺退雞蛋內臭水拂上一二次痊愈或小孩口內生疳或腮內生一紅塊名曰螳螂子亦皆胎毒也用生地五錢生軍一錢陳酒浸透取出共搗爛塗足心男左女右用絹縛好干即易愈乃止嫩膏塗遊亦效口疳用生香附半夏等分為末蛋白調作如餅貼男左女右湧泉穴周時愈湧泉穴即腳心馬曰方內用蛋中臭水一時難覓不如以芭蕉根搗汁掃之可退螳螂子不可刀割疔毒其患甚險其害最速生面目耳鼻之間顯而易見生肩足衣遮之處隱而難知早覺者晨醫夕愈遲知者枉死甚多即明槍易睹暗箭難防之意故婦女而患暗疔直至發覺誤認傷寒致毒攻心走黃不救黃即毒也如頭面唇鼻肩臂手足等處生一泡或紫紅或黃黑者疔也初起刺擠惡血見好血而止取拔疔散插以膏掩之次日疔毒化膿而愈凡屬疔毒宜服奪命湯紅絲疔手小臂足小腿生如紅線一條者是也要在紅線兩頭始末刺破毒隨血出而愈遲則毒入腸胃不救馬曰紅絲疔非刺去惡血不可然須細看必有紅絲上延方可用砭否則恐是刀鐮疔誤砭立見危殆不可不知馬曰奪命湯去細辛可服刀鐮疔患形闊如韭菜長有寸余肉色紫黑者是也忌行針刺以生礬三錢蔥白七根共搗爛作七塊蔥湯逐塊送下蓋暖取汗無汗再服蔥湯催之汗出為度取爛雞屎塗患立愈遲則毒掃心腑致命馬曰忌行針刺極是方亦平妥可用陶曰疔瘡走黃用芭蕉根搗敷之立愈走黃疔毒發腫神昏謂之走黃如在將昏之際急取回疔散二錢開水送服少刻大痛痛則許救毒化黃水痛止命活楊梅結毒楊梅瘡又謂棉花廣豆廣瘡因形而名然其感毒無二以化毒為貴熏罨為忌罨定復發難治初發以三黃丸每日五鼓取四錢熱陳酒送服醉蓋取汗或以瀉肝湯每日早晚輪服昔書所載升藥為丸雄黃為衣粥飲送服或點藥條一根口含冷水之法後學萬不可因此不費藥資致傷人命自召天誅如有因服升藥並藥條熏罨復發在五日之內日服三黃丸再取紫銀茶時飲如潰以渣煎湯患處日洗兩度接服聖靈丹可祛毒盡色轉紅活用洞天膏貼收功即如下疳蠟燭卸等毒總不離此前治諸法倘疼痛難忍以聖靈丹五分數服奏功如潰爛俟毒退痛止色轉紅活當以藥撒生肌如陽物硬而不痿白精流出此乃妒精用破故紙韭菜子各一兩為末每服六錢水一碗煎半碗服如見愈宜以藥剩倘毒重服聖靈丹無不痊愈馬曰此即江湖術士之隱藥萬不可用馬曰升藥用水銀煉成誤服毒收入骨須用青鉛川椒方能解之諸瘡瘡疥之生獨由於濕故南方卑下之地患生最多昔書皆言濕熱所致方中皆用生地涼血未見醫愈一人且以熏罨為法熏雖瘡愈然毒歸腹定成瘡疒鼓凡患諸瘡宜戒沐浴浴則濕氣愈重難以速痊痊後再戒月餘庶免復發忌食雞羊蝦蟹一應發毒新鮮等物並戒房事欲愈諸瘡者非得良方未易痊也按其名類有膿窠癩疥繡球風猴猻疳涇風頑癬蛀髮癬小兒疳肥瘡蠟梨火珠臁瘡爛腿漆瘡馬曰諸瘡癩癬用藥水洗亦可見功憔熏則不宜又曰有熱者生地又在所必用濕重者當用二妙為妥癩疥繡球風遇此二症用合掌散二錢可敷數次痊愈臨用以右手中指羅門黏滿香油再在包內黏藥塗入左手心合掌數摩俟藥止有氣而不見形將兩掌擦瘡每日早晚擦二次三日掃光再擦三四日不發馬曰此治癩疥之主方用之得宜效如影響惟腎囊上不可用膿疥門雜照前法以二美散蘸入手心合掌摩擦每日二次愈後再擦三四日膿窠坐板濕毒猴猻疳此等症以五美散和嫩膏調敷外以棉紙掩綁不可動揭五日後揭下再敷一二次痊愈如濕毒癢極先以金銀散敷上次以前膏加敷馬曰與合掌散同惡瘡極癢用金銀散醋調敷止癢如破爛爛孔癢極者白蜜調敷蠟梨瘡用掃雪散香油調膩剃頭後煎滾灰湯溫洗洗後以藥敷敷後不必再洗日以藥敷至愈乃止不癢惡瘡以豬苦膽和金霜散調敷頭面肥瘡用結子油每日早晚拂瘡兩度五六日愈戒食蝦蟹等發毒之物及煎炒熬油食則延開難愈臁瘡生於小腿男人謂之爛腿女人謂之裙風氣滯血瘀經年纍月臭爛人憎初起或由搔破或生小瘡化大或因經熱湯之氣所致或食毒物而成當以老蟾破腹蟾身刺數孔以肚雜代包填入孔內蟾身覆蓋孔外每日煎蔥椒湯俟溫早晚各洗一次以蟾易貼內服醒消丸亦早晚二服三日後取地丁大力鮮草搗爛填孔外蓋烏金膏仍以醒消丸日服如皮中滲出清水嫩膏加五美散敷如內發癢白花膏貼如內有硬塊如石以生商陸搗爛塗如孔內常有血出先以參三七末撒內次用牛蒡葉根搗填俟患口收小不用草填日以五寶散撒上仍以烏金膏貼之收功倘年老體虛酌投補劑爛瘡用烏金膏照患孔大小剪如膏藥一方針刺二三十眼取光面貼孔日煎紫花地丁湯洗孔並洗膏二次三日內毒水流盡色變紅活以水飛伏龍散撒上仍用前膏貼外戒多立行走房事食毒物凡婦人須待月信之後貼起漆瘡取杉木屑煎湯溫洗接以蟹黃滑石二末白蜜調敷患瘡日久此由體虛毒重敷藥按症酌用內服神仙棗四五日可愈瘡疒鼓以紅棗丸四兩用紅棗湯送服服完痊愈如遇瘡疒鼓危甚不及服藥當覓大蟹四五隻約每重斤余者令其白湯煮食飲酒蓋暖睡不兩時身上發瘡更狠於前而疒鼓全消仍以瘡治或服紅棗丸或服愈瘡棗火珠用生蘿蔔搗爛好醋浸敷遲治妨命流火患生小腿紅腫熱痛不潰不爛世之醫家惟以刀鐮出血或以鱔魚血塗總無痊愈之日時常發作復鐮復塗而已治法當以礦灰化於缸水內次日水面上定結一層如薄冰者取起以桐油對調膩厚每日拂上三次三四日痊愈後不復發醫時忌食豬肉諸癬用癬酒拂治先將癬三日一剃一拂至愈乃止蛀髮癬取生木鱉片浸數日入鍋煮透取湯洗洗後取蜈蚣油搽頭至愈方止或取草烏切片炙脆研粉醋調日塗三次數日愈馬曰先令剃頭湯洗陰頑惡癬以鮮角膏加醋煎至稠膩瓷瓶貯之遇此症先行剃之剃後以膏塗之日剃日敷俟毒水流盡再敷數次痊愈痔漏痔漏即腸癖凡人九竅中有小息肉突起即如大澤中有小山突出也不獨於肛門一處言痔故有鼻眼牙痔等名痔分五種狀亦不一曰牡曰牝曰脈曰腸曰氣未破謂之痔已破謂之漏肛門邊生出數瘡腫而突出膿潰即散者牝痔肛門邊露肉如珠狀如鼠奶瀝血流膿者牡痔腸口顆顆發癗且痛且癢血出淋漓者脈痔肛門內結核有血發寒熱登溷即脫肛者腸痔肛門腫痛遇怒即發怒息即安者氣痔酒醉即腫痛流血者酒痔色痔相同每大便有血注不止者血痔外痔以槐梅膏塗之痛息日塗兩次至愈乃止內服杜痔丸每早晚各服五錢內痔候登廁翻出肛外用溫水洗淨側臥其痔盡出勿使收入亦有痔自翻出大如茶杯形如一菌糞從菌心而出痛極難忍上面如盆四邊高中心陷下如菌根糞後用杜枸杞根搗爛煎汁熱熏溫洗洗淨以洞天膏攤如菜碗大中剪一孔以一邊剪開通孔烘熔圈於菌根貼於四邊圍護好肉誠恐上藥藥汁漓於好肉耳每取枯痔藥一二分入杯津調筆蘸拂菌之外面四旁日夜各拂一次菌之中心通連肛門大忌拂藥倘有流入大痛難當拂一兩日毒水流出菌形漸縮而軟再拂一兩日漸硬而黑菌邊日有脫下用藥一錢內再增硃砂一分仍用津調日夜照拂俟菌縮小黑硬再拂拂至菌根自落痊愈痔漏成管以退管散五錢黑糖拌空心陳酒送下管自退出乃止或用雙鱉丸亦可石癤夏秋頭面生紅癤初起取洞天膏貼周時全消潰者貼之亦愈用清暑散煎俟溫服即無熱毒之患大癰潰後議凡大癰潰後世人每投炙耆炙草或用半炙半生殊不知托裡散內用人參者並非以參補虛不過以參助耆添其托毒之力卻無補毒之害而炙耆只補氣不能托毒炙草只補中不能解毒倘毒氣未盡誤投炙耆炙草或用保元十全等湯致毒反得補助毒攻內腑余之治法凡遇初潰大癰止其痛痛息則毒散其腫亦退色轉紅活即可無須用參耆補托如須耆草亦皆用生不用炙也惟體虛年老者投參而耆草則皆炙也如體旺家貧者無參亦易收功馬曰此論極是何世之瘍科於潰膿以後每用參耆炙草以為托裡補住火邪致瘡難愈甚則毒攻內腑危殆不救能取此為法必無貽誤有陰有陽症門肺癰肺疽諸患易識獨肺中患毒難覺有兩腳骨疼痛者有腳骨不痛而舌下生一粒如細豆者再心口之上內作微痛及咳嗽口乾咽燥此皆肺中生毒之證也即用甘桔各三錢煎服服下如覺稍安肺之患毒無疑矣以犀黃丸十服服完痊愈此是預識預治百無一死之法世人但知腳痛醫腳咳嗽醫嗽舌下一粒便以刀刺且此一粒患未成膿定然色淡患愈亦消患篤其色紫黑如用刀刺立害諸書皆載云口吐臭痰胸中發腥作痛者肺癰也又稱症有三不治時吐臭痰久如粳米飯者不治嘔膿不止者不治白麵變赤者不治惟嘔而膿自出者易治治之之藥惟地黃保生歸脾等湯輪服而已並無預知早治之法直至吐臭痰發腥始知肺癰猶小舟飄入大洋也此等立論安可為後學津梁余每見此症吐膿其色皆白故稱肺癰用犀黃丸治無不效有赤貧者患之以陳芥菜滷每晨取半杯滾豆腐漿沖服服則胸中一塊塞上塞下塞至數次方能吐出連吐惡膿日服至愈凡患此症者終身戒食鴨蛋白鯗紅蘿蔔石首魚著甲魚食則復發難生馬曰肺疽肺癰均由咳嗽而起或外感風寒郁久化熱或心肝之火上炎肺葉脹舉而成癰膿故胸痛咳嗽吐膿吐血火刑金之候豈可以乳沒辛苦溫之品助其熱傷其肺麝香走竄盜泄真氣本草均稱諸瘡癰疽潰後勿服何況嬌臟受病乎發背此乃癰疽中大患緣其患位對心對肺對臍耳偏曰搭手因手可搭而名紅腫痛甚者應稱背癰治法詳於陽症門癰癤內如色白腫痛者當以流注法治如平塌不痛者當以陰疽法治此皆陰發背也如誤服寒劑誤敷涼藥誤貼涼膏定然毒攻內腑不救馬曰平塌不痛之症頗多不得均謂之陰疽凡疽初起必有頭脫骨疽凡手足之無名指患色白而痛甚者脫骨疽是也諸書載云急剪去指可保其命遲則腫延手足之背救無術矣殊不知此疽也大人以陽和湯小孩以小金丹最狠者以犀黃丸皆可以消之色紅者以熱癤蛇頭等法治之馬曰此症無論手足皆是火毒濕熱結成又有溫疫病中邪陷下焦而成者陽和湯斷不可投又曰脫疽無色白者必現紅紫之象或痛或不痛或麻木而冷十指各有主經何經受毒發於何指亦有漫延四指者然多生足指少毒手指均是火毒內蘊所致小金亦非所宜陶曰脫骨疽發於腳趾漸上至膝色黑痛不可忍逐節脫落而死亦有發於手者方用土蜂窠研細醋調應手而愈真神方也天蛇頭患生指上形似蛇頭故名紅腫者取白蘿蔔一段挖孔入雄黃三分蒸半熟套指或取烏梅仁嚼爛塗指及嫩膏塗之皆消如患色白小金丹服愈馬曰天蛇頭即是疔瘡非服小金丹之症如色白者是僵節蛀方可服小金丹不可不審也耳後鋭毒患發耳後又名耳後發宜別陽實陰虛治無一錯患色白者以陽和丸與二陳湯同煎服或以小金丹服消如色紅者醒消丸服消諸書不拘紅白概以元參牛蒡連翹蠶尾赤芍銀花等七味以治即色紅者尚服不消況色白者能不遭其害乎馬曰耳後鋭毒初有必有紅根白頭肝肺二經邪火蘊結又屬少陽三焦部位是經多氣少血陽和斷不可服若至潰後氣血兩虛邪從內陷參耆肉桂又當少少用之托裡補虛又曰初起以疏風化痰為宜蓋鋭毒即耳後發與腦疽同驢眼患生腳骨俗呼夾棍疽未潰色白以疽治紅腫以癰治如潰爛日久形如驢眼者莫以臁瘡治當問初起紅白以疽癰別治馬曰是症當以癰治為正牛程蹇腳底皮內生一泡痛難步履略去老皮以生草烏酒磨塗上速愈如患生腳底之心名湧泉疽當別紅白色治馬曰當作濕熱治色紅者熱甚色白者濕重懸癰患者肛門前陰根後兩相交界之處初起細粒漸如蓮子大數日後如桃李大俗呼偷糞老鼠潰經走泄即成漏生管漏久成怯怯症人患此乃催命鬼也諸漏可醫獨此難治治則漏管愈大致成海底漏不救在於未成膿時用生甘草制軍各三錢酒煎空心服一劑即愈如成膿以醒消丸愈之倘患色白者小金丹愈之馬曰此漏亦有治法不雜內症者可治如見咳嗽發熱則不治矣又曰熟軍醒消小金諸方見陰虛咳嗽耆不可投乳癰又名妒乳婦人被兒鼻風吹入乳孔以致閉結內生一塊紅腫作痛大謂癰小謂癤又未産謂內吹已産謂外吹以紫河車草浙貝各三錢為末黃糖拌陳酒服醉蓋取汁或用白芷散五錢酒送一服全消如潰以醒消丸酒送一服以止其痛外貼洞天膏自愈倘內吹忌服醒消如患色白者應以流注法治倘潰爛不堪以洞天救苦丹服七日後接以大棗丸服至收功馬曰乳癰系肝胃氣火鬱結與乳汁壅滯而生其紅腫者用草河車浙貝尚屬合宜至色白者以流注治法治之則大謬矣蓋流注由痰滯所致與乳癰全然各別不得以治流注之治移治乳癰也魚肚癰患生腿肚此乃肉緊筋橫在一身用力之處最痛難忍外以扎藥扎上內以五通醒消二丸每日早晚輪服初起立消以藥咬穿庶不傷筋而無縮腳之損色白者應以疽治扎藥忌用孕婦亦然馬曰此乃濕熱及瘀血凝結而成即色白者亦不可以治疽之法治之痘毒色白者因出痘服多涼藥血寒氣滯乘虛發毒往往醫家誤為痘後火毒未盡治之致流走患生不一久則生管成漏漏久內生多骨害人不少凡遇此症應以流注法治以小金丹消之有貧家痘後不服清火之劑結成痘毒其色紅亮者當以癰法治之馬曰痘乃先天火毒漿不足者痘後必發毒每生於關節移動之處最為險惡潰亦難斂必生多骨即骨出收口筋節俱強不能自如初起均宜消散為是皮白者當和血化毒用川芎當歸二陳殭蠶忍冬藤貝母等治之外用生黃豆嚼爛塗之可消咽喉口舌門咽喉之地最為急症頃刻而痛難忍者系寒婉轉而痛方勝者系熱猶之雷電之焰因陰生燎原之火由漸著內經云驟起非火緩發非寒虛寒實熱識透者獲濟是在明達之士知所區別乃隨所施而無誤耳馬曰喉痛之症色白不紅不腫者寒也紅而腫者火也然色白者亦有因風白而微腫者痰與氣也內經之驟起非火緩起非寒非指喉痛而言若云初起實系寒生未必盡然或有伏熱在內如服肉桂豈不助暴為虐疑似之間莫若先以薑湯試之最為穩當陶曰先生言或有伏熱在內如服肉桂豈不助暴為虐是矣但以薑湯試之其法亦未盡善蓋薑亦熱物也如不識脈之人何不用西醫寒暑表測其寒熱況豫有醫學簡便寒暑表其法較泰西所作尤為靈捷作表及用法其説頗長已載豫著有益齋雜記內喉痹痹者不仁也本無毫恙頃刻而起此係虛寒陰火最為危急之症其見證痰在喉中作響響如打鼾舌色白而不腫諸書皆稱肺絶不救蓋緣誤服寒涼以致死耳當以桂薑湯緩緩咽下可以立愈或以生川附切片塗以白蜜火炙透黑收貯臨用取如細粞一粒口含咽津亦立刻痊愈先以鵝毛黏以桐油入喉卷之痰出服藥馬曰痹者閉塞之謂非不仁之謂痹症湯飲猶可通若閉則水漿不能入矣用臥龍丹吹之取嚏可松陶曰又皂角末或半夏末吹入鼻中皆可取嚏如無藥物即以細紙捻子在鼻中攪之亦可取嚏凡咽喉初覺壅塞即用此法取嚏數次亦可散熱毒此通竅法也乳蛾其形圓如箸頭生於咽喉關上者輕生於關下者重若左有右無曰單或左右皆有曰雙雙者輕單者重以土牛膝絞汁含口慢咽如無鮮者用天名精丸化服亦可馬曰土牛膝汁含咽乃是吐法喉癬體虛多郁者患之喉中不閉不腫氣出如常微微疼癢飲食不遂者是此係虛火淹纏難愈忌刺畏補當用雪梅丸噙含每日一丸十日可愈馬曰書雲實火可瀉虛火可補畏補之説顯悖經旨忌刺之言的確不磨又曰此症乃水虧虛火傷肺膽礬雄黃不可用喉珠系腦門生一紅線如發懸一黑泡大如櫻珠挂至咽門如用刀點即死取土牛膝活根搗汁以好醋二三滴和勻滴入鼻中三四次絲斷珠破吐出瘀血立愈鎖喉喉內無蛾形痰聲不響而喉欲閉者是治詳煎劑門陶曰葉天士謂鎖喉風乃杜撰之名此病有閉有脫閉者氣道閉塞關竅不通而死脫者大汗大吐大瀉虛脫而死閉證當以開通關竅為急脫證以補虛收斂為要又曰葉云凡遇咽喉閉證不能開口難以進藥以及手足冰冷面色青白並無痰聲脈伏倒地先用紫金丹以淡薑湯磨灌後用二陳加菖蒲鬱金枳殼香附等類治之可愈又曰脫證宜用大劑參附佐以龍骨牡蠣五味黃耆之類纏喉風喉內熱結喉外腫繞且癢且麻者是治詳煎劑門馬曰凡屬喉風有痰者稍輕無痰者重不可不知如有道路無人店之處藥未備在者遇有喉症取針刺其兩指少商穴無藥亦愈喉閉倘喉內之痰塞滿口舌舌有痰護此痰不出牙齒作響如鼾惟喉痹誤服涼藥有此症也如再遲治痰塞鼻內氣無出入即死急取鵝毛蘸桐油卷痰痰出亦以桂薑湯愈之病者二三日前覺氣急短促手足厥冷忽痰壅氣閉命懸頃刻者是急服蘇子前胡等藥如於道路無人店之處藥未備者遇有喉閉急取一針針其兩指少商穴無藥亦愈馬曰喉閉乃咽喉閉塞水漿不入或有痰或無痰有痰須桐油探吐以白金丸三五錢泡湯含之內吹祕藥無痰者亦以白金丸含之吹祕藥牙疳凡患牙疳牙根紅腫及口喉之症以紫毫喉槍點之以珍珠散吹之馬曰珍珠散吹牙疳甚妙走馬牙疳少商穴大指內側之端去爪甲角如韭葉許左右同此患最易延腫穿腮不堪危險急以赤霜散吹之效速如神久爛之孔生肌亦速或用馬蹄散吹患處立愈馬曰赤霜散妥善可治牙蝕此症每因患骨槽風所致透骨穿腮亦屬危險用南星散拂患處數日愈風火蟲牙用刻歡丸一粒噙於痛處丸化即愈馬曰治風火蟲牙神效舌上出血用水金散吹擦即止馬曰衄血尿血皆效小兒口疳用香清餅貼男左女右湧泉穴一周時愈馬曰此托藥也可用惟不可被割舌腫用四黃散擦之即愈馬曰實火可用口疳時發用二冬散含之即愈馬曰虛火用此方神應虛火之見症色淡不鮮與實火有別舌硬生衣先用針刺出舌尖黑紫血以犀黃散搽之須臾舌軟馬曰舌硬是痰火上升當服煎劑以降之徒侍搽擦無益熱痛喉症用壁錢散吹之最效馬曰是方以治痰火喉痛頗效附視咽喉七症訣咽喉症有七形如箸頭蛾無蛾喉欲閉鎖喉症亦異纏喉熱結內麻癢腫繞外日氣氣短促厥冷喉閉礙喉痹鼾痰響肺絶須治快喉癬因虛郁微作癢疼態不腫又不閉淹纏最作怪喉懸一粒珠刀點命頃害藥從鼻里吹珠破病即退附制喉槍法以純紫毫細長筆筆根用絲線扎固濃磨京墨蘸飽之俟筆曬乾再蘸一二次乾透極硬用以代刀點喉患雖被刺而不致傷損即病家亦視而無恐矣雜症門湯火燙地榆磨細如面香油浸敷破損者敷後加以乾末撒上如潰爛不斂者取伏龍肝入炭火燒紅水飛曬乾研為細末人乳調敷或用綿線油拂上立刻止痛多則二次痊愈功靈效速乃湯火燙之聖藥也狗咬先用尿淨以番木鱉切片瓦上炙炭存性研末撒上二三日可以收功如腐爛成膿有胸痞之象者當服護心散治法宜主清火化毒馬曰最妙用萬年青即千年蓮連根搗汁服即用渣敷咬處雖瘋狗咬傷眼紅腹內作痛者服之無不其應如響跌打骨斷用緑礬斤許煎湯粗草紙浸透裹於傷處再以燈心繩火於紙上熏之紙溫即將紙易再熏可以立刻照常或於斷骨骱上傷處用竹片綁七日痊愈或用黎洞丸內服外敷亦效馬曰方亦靈驗然起死回生不如回生丹多多矣閃頸促腰用硼砂研粉以骨鑽蘸津沾粉點兩目淚出稍松連點三次立時痊愈骨鯁用燈心灰吹三四次骨化而愈或用雙砂湯連連服下即化為涎馬曰古方可用天絲入目捉肥蝨二十餘個二指捻熟針破蝨腹令人仰臥將蝨血滴入眼內少刻天絲隨血而出塵屑入目吐津於石瓶上以人指甲磨濃骨鑽蘸津點入眼內不一刻一抹而出赤眼淹纏用金烏湯食下隔兩日再服一次痊愈馬曰赤眼乃肝肺之熱杜仲酒釀似不宜用孩童目疾黃連柴胡各一錢研末人乳調和塗於湧泉穴男左女右可愈痘後目疾痘有初開眼內有星翳取杭州胭脂泡水以紙鋪水面上新筆於紙上蘸水一日拂三次三日愈遲治帶疾鼻衄以水金散煎服外用龍骨末吹入立止大麻風爛潰不堪者初起未爛治法同效用粗如酒杯之蛇一條竹刀破腹去雜切寸段取瓦放於炭火上以蛇段豎放瓦上跌倒者系無毒之段棄之不用不倒者有毒用炙存性磨粉拌入飯內覓通身白毛鴨一隻與食次日鴨毛盡脫以鴨殺之石鍋內煮爛勻作四五日食凡吃鴨第一頓其腫者更腫第二三頓收小吃完愈馬曰麻風忌蛇忌酒此方萬不可用另附方乳懸此乃怪症也世間亦偶有之産後兩乳伸長形細如雞腸垂過小腹痛難刻忍急用川芎當歸各一個先各取四兩切片水煎時服以所餘斤半切大塊産婦面前放一桌下放火爐將芎歸入爐慢燒令婦伏於桌上口鼻及乳吸煙如葉盡未痊再如前法煎服熏吸便可縮上倘不能復救取萆麻子一粒冷水磨塗頭頂見縮復舊即時洗去乃愈愈後倘日後再産必復發不救故膏藥不可以萆麻煎入倘貼孕婦下身瘡癤即小産産後尚不覺膏故再貼致命可見巴豆萆麻之害如此馬曰此是古方平妥可用如不應再加黃耆八兩煎服即效陶曰用纏足婦女臭裹布扎縛其乳亦收上矣

body:
  text: 卷三諸藥法制及藥性夫用藥如用兵也兵有勇猛藥有燥烈烈藥經制則純勇兵經練則精兵精破賊不難藥純治病易愈苟炮製不妥猶勇兵之武藝未備也今人不精於制而視性之烈燥者畏之如虎反諉之曰非徒無益惟恐有害豫初讀藥性繼攻炮製然藥之性古今之議未遠炮製之法卻有不同豫留心四十餘年深得其法用之功靈效速萬無一失始悉烈藥之力如勇兵製藥之方如演武也因古書獨於烈藥之處未詳是以録登是集為炮製之補遺云爾甘草切三寸一段水浸透放鐵篩上炭火慢炙炙至汗將出即取離火暫冷再炙炙至草熟去皮切片熟者健脾和中甘平之品乃九土之精生者化百毒和藥性潤肺解瘡疽胎毒利咽喉人參補氣獨入肺經肺主諸氣肺旺則四臟皆旺精自生而形自盛補中益氣一切虛症要品黃耆去心蜜水潤炙如入補腎藥以鹽水潤炙切片炙為補氣藥生有托毒功白朮於朮浸一宿切片土拌蒸透去土勿炒於朮浸刮去皮飯上蒸日曬數次如棗黑黃土炒於朮之功勝於白朮乃中宮和氣補脾之藥蒼朮泔水浸去粗皮切片曬乾土炒炭治脾胃寒濕消痰逐水不伏水土止瀉痢霍亂久服延年當歸酒浸曬乾切片上部用頭中部用身下部用梢頭身活血梢破血全用定血引血歸經除頭痛和血補血潤腸胃筋骨皮膚排膿止痛白芍外科用酒炒固腠收斂赤芍消癰腫破堅積惡血下氣生肌止痛厚朴去皮切片每斤取帶皮生薑四兩切片同煮汁干炒透去姜溫中消痰厚腸胃除積冷宿血宿食丹參色赤酒潤炒血分藥也補心血養神志生新血安生胎落死胎為胎前産後要藥每晚酒送末二錢連服四十日可療痛經即孕元參蒸曬忌銅器消癰滋陰降火利咽喉通小便地黃生用性寒涼血滋陰解熱水煮至中心透黑然後每斤入滾陳酒半斤炒砂仁末一錢再煮煮至汁盡瀝起曬乾所瀝原汁仍入收盡再曬乾忌經鐵器補陰壯真氣生肌填髓同肉桂引火歸元療陰分虛虧牛膝産川者佳酒拌蒸則補生用亦效補腎強四肢産懷者下行麥冬去心酒浸則補湯泡則微寒祛熱毒浮腫泄肺中伏火安髒心腹天冬去心酒潤治陽物不起潤五臟咳嗽消痰降火去風熱煩悶茯神安魂魄養心血治心神不安赤茯苓破結氣瀉心小腸膀胱濕熱利竅行水白茯苓蒸透切逐水暖脾生津止泄除虛熱開腠理穀芽啓脾進食寬中消食麥芽開胃消食和中苡仁補肺益脾去濕消水腫理腳氣芡實炒治遺精濁帶益精助胃氣明目杜仲去皮每斤用蜜三兩塗炙蜜盡為度肝經藥也補中益腎補肝虛堅筋強志肉桂純陽之品引火歸元解陰寒凝結去皮曰桂心更純桂枝性橫走手臂發表官桂理陰分解凝結愈瘧疾行血分通毛竅川附子昔産深山有毒今民家栽種無毒用水浸一二日每宿易清水浸去鹹味麵裹火煨切片曬乾補腎肝陰虛治中風癱瘓陰陽疝氣大黃每斤用陳酒五斤煮爛曬乾名熟軍治燥結熱毒清實火下宿積化停食生熟功同熟者純黃連大寒治實火凡痢疾目疾非實火誤服致命為倒胃之藥惟驚能療解巴豆輕粉之毒胡黃連性同黃芩苦寒風痰骨蒸喉膽癰毒養陰退陽香附去皮童便浸水洗曬搗醋鹽水拌炒解鬱消癰積聚痰飲調經琥珀用側柏子末入瓦鍋煮有異光取起入燈心對分研為粉清肺利小腸安五臟定魂魄消瘀血明目冰片苦寒治舌口咽喉火毒研水調吞治難産沙參清肺火益心治久嗽肺痿消癰排膿苦參泔水浸蒸切曬乾主風熱蟲症腸風血精下痢治大麻風虛弱忌服松子仁潤肺治燥結咳嗽同柏子仁治虛閉柏子仁甘平無毒興陽道益壽元潤腸安神杏仁去皮尖除肺熱氣逆潤大腸氣閉大麻仁利大腸熱燥大便熱結乳香每斤用燈心四兩同炒炒至圓脆可粉為度扇去燈心磨粉用消癰止痛托裡護心治遺精難産沒藥製法與乳香同破堅敗惡血消腫生肌墮胎去翳藝香亦名白膠香水煮三度俟湯溫手扯油淨冷即硬磨粉解疽毒止痛輕粉對研豬油調敷爛孔樟腦每兩用碗對合濕紙封口火升半時則成樟冰治中邪腹痛風痰加花椒同升殺蟲牙止牙疼丁香辛溫治霍亂痞塊吹鼻愈腦疳反胃開膈關腹中腫毒鼻中息肉乳頭裂破沉香乾研末或酒磨以煎劑沖服治腫毒心腹痛調中補臟益精神壯陽松香先取胡蔥煎湯去蔥以湯分三次煮香每俟湯溫在湯內手扯洗其油去盡冷凝磨粉專療濕風治白禿生入膏生肌木香下降療腫毒止吐痢消積止腹痛統理氣分草烏有烈毒去皮取白肉每斤用緑豆半升同煮豆開花去豆取烏切曬磨粉治風痰手足拘攣逐凝結追筋絡寒痰開腠理以黑皮炙研醋調治蛀髮癬川烏功同附子性暖助陽補命門不足破積冷痢巴豆仁研壓數次油盡如粉名巴霜拔毒孕婦忌用枳實枳殼即細皮香圓六月摘者實八月摘者殼陳蛀者佳並去瓤核以麵炒實寒消食積開胸結殼亦寒健脾開胃止吐消痰除裡急後重青皮順逆氣開鬱解疔毒檳榔健脾破結療痢裡急後重截瘧神麯消食健脾暖胃止瀉吐破堅結山楂浸透去淨其核曬乾炒炭除産後惡血消肉積積滯宿食廣陳皮治脾不化谷膀胱熱利小便殺寸白蟲去白名橘紅消痰止泄咳開胃治吐清水腸閉解大毒枸橘陳者佳全用療子癰炙存性研陳酒送服療疝氣核治腸風下血方中橘核即此每有以爛橘核誤用者蘇城醫家尚未認得枸橘浮麥止虛汗盜汗虛熱高良薑土炒療寒邪痞癖瘴瘧宿積生薑溫中去穢除風邪暖胃消寒痰解食菜毒乾用止嗽嘔炒成炭性純陽如誤服寒劑非此不解水紅花子研損用克堅消痞痰積惡滯車前子酒拌炒研損分理陰陽利小便止暑濕瀉痢益精養肝肺強陰止痛馬鞭草苦微寒熬膏空心酒服半杯治癥瘕殺蟲通經活血塗癰癤煎湯熏洗陰腫洗楊梅惡毒連翹瀉心火脾胃濕熱結熱腫毒心家客熱通經牛蒡子酒拌焙乾研損達肺利陰消痘疹毒根莖葉苦寒無毒混名氣殺醫生草生搗塗消一切癰毒塗軟一切堅肛入爛孔拔毒生肌入膏貼癰癤煎湯洗楊梅等毒去毛敲損治黃疸脾濕麻黃連根發表用梗不表甘溫開腠理凝滯閉塞桔梗去頭枝浮皮泔水浸一宿切片微炒清利肺經消痰理咳清上焦熱治咽喉排膿口鼻諸症知母去尾切片上行酒潤焙下行鹽水潤焙瀉有餘之相火多服令人泄天麻酒浸透以粗紙黏余酒裹煨切片焙用治風濕四肢拘攣助陽通血脈利腰膝強筋頭風眩暈地榆水洗去骨切曬磨粉愈惡肉燙火膿血犬傷白芨療瘡嚼塗手足燥裂三七止血定痛癰腫蛇傷秦艽去毛浸一宿曬乾切片搜肝膽伏風養血榮筋理肢節痠麻不遂大便滑泄者忌用柴胡去皮切忌經火苦寒行兩脅入膽經暢氣血肩背痛銀柴胡亦同勞羸者尤宜根上升梢下行前胡去淨皮須入竹瀝內浸潤曬乾切用微寒肝膽中風痰非此不療柴胡主升前胡主降散風祛熱消痰下氣開胃化食止嘔喘嗽安胎治小兒夜啼防風甘溫走膀胱瀉肺實火頭風眼淚祛濕而黃耆得之其功愈大乃相畏而相使也獨羌二活去皮焙用治一切痛風散癰毒惡血腎間邪風升麻內白外黑者佳治脫肛遺濁小便閉塞用此提氣下元虛者忌用元胡索破血利氣通經止痛貝母去心糯米炒黃治肺家燥痰敷惡瘡浙貝去心炒專消癰疽毒痰龍膽草去頭須切細甘草湯拌曬味澀大寒相火寄在肝膽瀉肝膽膀胱之熱火療咽喉茅根甘寒入胃治內熱煩渴利小便止喘黃疸細辛去頭爪水浸一宿切曬治牙疼頭風通疔竅白芷水浸去灰切炒消癰蝕膿頭風中風解砒毒川芎不油者佳忌獨用主一身氣血開鬱去瘀血調經種子排膿生肌頭風目淚多涕去濕丹皮酒拌蒸産後要藥治骨蒸麵裹煨熟厚大腸藿香治腫毒去惡氣止霍亂溫中快氣吐逆澤蘭治癰疔通九竅利關節破宿血生肌利小腸荊芥散風熱清頭目風利咽喉瘡腫賊風薄荷治賊風發汗利咽喉口齒瘰癧結核紫蘇葉發汗梗安胎子消痰喘葉梗為末治囊脫白甘菊治目風熱梗枝葉解癰疔毒煎湯洗結毒陳艾用粉糊漿曬透杵去粉並葉屑則成白絨謂之熟艾調經加硫黃少許作丸灸百病茵陳治黃疸濕熱通關節去滯熱利小便夏枯草性寒以治瘰癧從無一效久服則成癧癆燈心利小便清心火取活竹一段兩頭留節中開一眼以心塞實外以原刻下竹仍填原眼外加泥裹入糠火內煨至竹成一炭取出去泥俟冷去竹炭內是燈心炭也治骨鯁敷陰疳入護心散蜀葵根水煎服可愈白帶花一兩搗爛麝香五分水一大碗煎服可愈二便閉無花時根亦可子催生落胎花末酒服可下橫生倒産半夏選肥者生薑明礬湯浸透煮透切片曬乾消痰墮胎生研細末立療刀斧跌破止血紫花地丁癰疔用之可療軟堅肛稻麥芒黏咽喉嚼爛咽下即安仙人對坐草四季梗葉常青凌冬不衰毒蛇咬搗汁飲以渣塗立愈五味子鹽水拌蒸滋腎水不足強陰固精主收斂蚤休即紫河車草去皮毛切焙微寒治乳癰疔毒黑白牽牛仁酒拌曬除濕熱壅結通大腸閉殺蟲祛積天花粉治痼熱唇乾口燥愈熱癰排膿防己寒酒潤治膀胱蓄熱利二便療下部紅癰木通微寒開通閉塞經水利小便和血脈清伏熱散癰腫下乳金銀花消癰毒取活藤煎膏以花拌入收曬其解毒之功勝花百倍暑天日取錢許滾湯沖當茶澤瀉通利小便走腎膀胱有泄濁者忌用海藻昆布性寒稱治瘰癧聖藥者卻謬當禁用楝樹根去皮取白肉殺腹內諸蟲皮赤者忌用角刺五月初取嫩者搗爛醋煎膏療癬生用穿癰無醋可療橫痃淡竹葉解煩熱利竅治中風口瘡目痛胸痰熱毒藥鋪有賣葉如竹葉甚薄梗如柴心甚細七寸長者是今醫家以草開緑花者誤用可嘆天竺黃治小兒驚痰每取二錢加雄黃牽牛末各一錢研勻面和為丸粟米大每服五丸薄荷湯送下治失音不語吳茱萸浸熱湯七次去淨苦烈治瘡生炒研用白芥子炒研皮裡膜外陰寒之痰非此不消益母草女科諸症皆良活血破血調經止痛下水消腫紅花酒灑焙少用通經活血多用破血去瘀血續斷酒浸炒性微溫入肝家續筋骨助血氣消血結胎産跌撲行血止血金鈴子即川楝子酒拌透蒸去皮入丸用核捶捆不用肉入煎用肉不用核苦寒有小毒川産者佳本地者細入火燒存性能托毒水治久潰爛孔桑白皮取白肉切焙瀉肝火降大小腸氣散惡血柘樹取皮里白肉甘溫無毒治血結補損處血竭散滯血止諸痛生肌阿魏酒拌曬研殺蟲解臭消痞解死獸肉毒肉積密陀僧研水浸煮澄去水曬乾入膏消痞殺蟲蒲公英又名乳汁草甘平無毒書載療乳癰結核實無效驗炙脆存性火酒送服療胃脘痛白蘞苦平無毒生肌止痛解狼毒蟲毒土茯苓清熱泄瀉骨蒸利關節治楊梅結毒聖靈丹以此煎湯調番木鱉水浸半月入鍋煮數滾再浸熱湯中數日刮去皮心入香油鍋中煮至油沫盡再煮百滾透心黑脆以鐵絲篩撈出即入當日炒透土基細粉內拌拌至土粉有油氣入粗篩篩去油土再換炒紅土粉拌一時再篩去土如此三次油淨以木鱉同細土鍋內再炒入盆中拌罨一夜取鱉去土磨粉入藥獨有木鱉之功而無一毫之害能搜筋骨入骱之風濕祛皮裡膜外凝結之痰毒取煎之油俟煎膏藥入用甘遂每斤用甘草四兩煎湯浸三日湯黑去湯河水淘洗取清水日淘日浸每日換水數次三日後去心再淘浸四五日取一撮入白瓷盆內隔一夜次日盆中水無異色乃妥再淘三四次瀝乾以麵裹如團入糠火煨煨至麵糰四面皆黃內藥熟透取出曬乾入鍋炒透磨粉其苦寒之毒經制則淨不苦而甜不寒而溫專消堅結痰塊毒核常山生用損神喪氣切薄片曬乾每一斤用陳酒對浸浸透取瀝曬乾收盡斤酒曬透炒至焦脆瘧痰非此不消炙甘草對分截瘧聖藥大戟苦寒有毒去附枝水煮透去骨切曬消頸腋痰塊癥結下痞墮胎治鼓脹利二便商陸有毒忌鐵器搗敷石疽消尿哽通二便疏泄水腫有排山倒嶽之力腰腹背忌敷貼硫黃敲細粒以蘿蔔搗爛絞汁煮再換紫背浮萍湯煮再煎角刺湯飛過去盡毒臭曬乾研粉色白取豬臟淡煮爛熟每日早晚各取一段蘸粉分餘食治久痢滑瀉命門不足虛損泄精壯陽道補筋骨殺臟蟲長肌肉治陰蝕生用殺瘡蟲愈瘟雞雄黃名腰黃透明者佳水飛治惡瘡死肌消癰毒化腹中瘀血藤黃酸澀有毒蛀齒點之即落忌吃煙白明礬透明者佳蝕惡肉固齒以橄欖蘸食味佳愈癲症解腸中毒治癰痔頑痰緑礬即皂礬療疳黃胖燥脾濕化痰砒石經制無毒不傷人畜同鉛入器內砒放鉛底火熔煙盡為度鉛上刮下者名金頂砒取香油一兩生砒一錢研入油煎沫盡煙絶擦鵝掌風取紅棗去核以砒代核發扎入炭火煅至煙盡取研細粉名赤霜治走馬牙疳久潰不斂者撒上數次收功生者可療冷哮不傷人者硃砂研粉水飛養神安魄除中惡腹痛驚癇胎毒水銀應依方制用有微毒治惡瘡白禿下死胎銀硃有微毒療疥癬殺蟲止癢殺蝨銅青酸平微毒治惡瘡疳瘡殺蟲吐風痰鐵屑殺疥蟲鉛粉酸冷無毒消中風痰止驚吐逆輕粉無毒除爛孔毒根驚癇痙痓惡瘡癩癬滑石丹皮對分煮透取石研水飛通九竅利六腑生津液分水道行積滯逐凝血降心火解暑熱硼砂性暖止嗽療喉去翳口齒諸瘡閃頸促腰津蘸點目立愈元精石鹹溫無毒治小兒驚癇硬舌寒水石性寒火煅用治潮熱中暑牙疼伏龍肝即灶心土再燒紅研水飛曬乾乳調立療湯火爛孔東丹臨用炒紫色篩入膏內生肌療濕殺疥癬蟲皮脂即煙膠硝皮鋪刮下諸皮之膜入鍋炒炭磨粉生肌肉療濕風膿窠濕爛等瘡萆麻子辛熱有毒研粉去淨油方妥拔毒孕婦忌用山梔炭苦寒無毒熱厥頭痛疝氣湯火萸肉選淨補精益腎紅曲炒消食活血健脾胃療痢酒服除産後惡血白豆豉解砒毒除痰咳同生砒為丸療冷哮砂仁順氣開鬱結炒研安胎産後停惡露小腹作痛生研六錢滾水沖蓋溫服立療山藥開朦補精血健脾胃橄欖形尖入心經清心火解魚鱉毒生津止渴蘸明礬食味佳豁痰小黑豆同甘草除瘧胃中脾熱臟中結積大紅棗解烏頭附子雄黃毒和陰陽調榮衛生津液甘蔗甜寒絞汁可療小兒衣多罨熱之病烏梅酸澀斂肺安三蟲拔毒根蓮鬚固精烏髮悅色益血止血橙子患惡核瘰癧痰症者食之患成不治愈後食者復發楊梅患疝病者忌食燒酒同食致斃頭髮壯年人者佳以皂角煎湯洗淨曬乾同油煮成餅浮起枯色為度入膏生肌長肉止血指甲瓦上土炒成炭存性研粉吹止鼻紅加冰片吹治咽喉塵屑入目以津磨甲膩點睛立愈人中黃臘月取孩結糞陰乾泥裹煨炭治熱狂痘毒腳麻麻至小腹而死或頭麻麻至心口而死者一日死蘇幾次取末三錢豆腐漿調服立愈人中白系夫婦之精入馬桶歸坑凝於底者是俗名坑凝蘇松常鎮所屬人家多有以缸作坑者雖取之甚便然僧寡婦家中之坑所産坑凝不妥入火煅煙盡悶熄研用治咽喉口齒瘡疳諸竅出血血汗象皮炙成團存性研粉生肌肉龍骨白淨沾舌者佳捉燕子破腹棄腸以骨填腹懸井內離水尺許候准一周時取出生研水飛曬乾用蓋龍有病食燕而愈得水而騰忌經火生肌斂瘡治鼻紅穿山甲尾上細甲良同土炒至鬆脆研通經絡竅殺蟲消癰逐邪風祛積濕愈痔蛇蛻豎蛻不經地者佳泥裹火煅去泥研粉治疔腫以蛇蛻不煅煎汁敷白癜風洗惡瘡白花蛇即蘄蛇鼻向上有方騰花紋者佳去頭尾酒浸除皮骨炙則不蛀治濕癢山羊血解鮮菌河豚毒傷損惡血山羊屎曬乾炒成炭存性入壇悶熄磨粉療潰爛生肌酒送二錢療雷頭風水粉各一升浸一夜絞汁頓熟每午刻服疳痢欲死者三服痊愈貓屎在屋上曬白者多收以土裹火煨黃糖拌食治童子癆傳尸癆真仙丹曾愈多人鼠屎尖者佳要揀淨恐有蛇蟲毒屎混入炒透研粉治易症療爛孔追毒水麝香定神療驚解果毒消癰疽開經絡竅墮胎石首魚即白鯗開胃益氣首中腦石燒研入冰片治害耳膿出患肺疽者終身戒食線膠剪細同牡蠣粉炒如珠去蠣為粉性溫補腎益精止遺精白濁雞內金炙透磨粉消久停宿食療疳疒鼓珍珠入豆腐煮一炷香取出與燈心同研極細去心除翳障安魂魄療驚逐痰止遺精白濁解痘疔毒下死胎胞衣生肌肉牡蠣童便浸七日硫黃末醋調塗黃土裹煅止夢遺赤白濁補腎安神除盜汗消痰塊白丁香即麻雀屎雀身細頭圓翅長者乃雄入籠取屎冬月佳甘草湯冷浸一宿焙研咬癤拔疔毒五靈脂研末酒飛曬乾止經水過多赤帶不絶男女一應瘀血凝結齒痛蚯蚓糞入火煅紅每兩入輕粉一錢研至粉內無星為度取活紫花地丁搗爛絞汁調塗爛腿日洗日塗數日愈以甘草煎汁調塗小兒陰囊腫痛蚯蚓藥鋪有賣破腹去泥酒洗曬乾每四兩配糯米花椒各一兩同炒炒至米黃透為度去椒米磨粉治歷節風痛手足不仁疽毒卵腫蜈蚣取活者香油浸死治蛀髮癬搗爛塗足指雞眼一宿脫落愈而不發癩團即老蟾大者佳生用填爛孔拔深毒軟年久毒肛取酥捉老蟾仰天以其頭入戥殼內取戥箍上蟾之腦中放出白漿是去蟾以戥殼曬乾刮下配藥消癰拔疔止牙疼絞腸痧脹田螺搗爛塗結硬痰核塗命門通小便入冰片愈痔如入膏內煎必預敲碎其殼以防油爆爆則近人受燙沾衣朱鱉大如錢腹赤如血又名金錢鱉出深山石澗中廣德州最多甘無毒炙存性研粉能消漏管蠍子水洗三次去鹹味炙研用治驚中風蟬殼滾湯洗去泥翅足曬乾治目昏翳障痘疹疔腫五倍子斂肺生津消酒毒收濕療脫肛殭蠶糯米泔水洗淨炒研治中風喉痹散風痰消瘰癧風瘡陰癢療驚愈疔毒痔瘡蜂房露天有蜂子在內者佳炙研能拔毒療久潰止痛同頭髮蛇蛻燒灰日以酒送錢許治臟腑歷節惡疽疔毒以炙存性酒拌服治失禁遺尿煎湯洗毒孔無蜂者不效土蜂窠在嚴冬大雪中以布袋袋之能取取入蒸桶蒸死連窠炙研以醋調塗癰癤即消以蛇蛻同煅治疔毒走黃乳調服療小兒吐瀉青蒿蟲九月中節內生紅蟲取出以輕粉硃砂和入搗為丸如粟粒大每丸裹以金箔每歲一粒乳汁送服療治急慢驚風蜘蛛炙研粉豬乳調治啞驚捕屎蟲即蜣螂五月晴日有蟲捕人糞一團如推車者是火炙研粉如和乾薑末可以敷出多骨忌經水如生搗為丸塞肛門引痔蟲出盡永瘥
